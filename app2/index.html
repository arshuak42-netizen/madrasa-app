        * { box-sizing: border-box; }

        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-light {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .card-hover {
            transition: all 0.25s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }
        .gold { color: #fbbf24; }
        .silver { color: #d1d5db; }
        .bronze { color: #d97706; }
        .tab-active {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-bottom: 2px solid #fbbf24;
        }
        .accordion-header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .blur-holiday {
            filter: blur(4px);
            pointer-events: none;
            opacity: 0.5;
            transition: all 0.3s;
        }
        .blur-holiday::after {
            content: "ഇന്ന് അവധിയാണ്!";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            color: #ef4444;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 1rem 2rem;
            border-radius: 1rem;
            border: 2px solid #ef4444;
            pointer-events: none;
        }
        .popup {
            position: fixed;
            bottom: 20px;
            right: 20px;
            max-width: 360px;
            width: 90%;
            z-index: 9999;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #fbbf24;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        return firebase.database();
    } catch (e) {
        console.error('Firebase init error:', e);
        throw new Error('ഫയർബേസ് കണക്ഷൻ പരാജയപ്പെട്ടു. വിവരങ്ങൾ പരിശോധിക്കുക.');

}

                    if (username === 'sadhar' && password === '6682') {
                        APP.currentUser = { role: 'sadhar', username: 'sadhar' };
                        renderApp();
                        return;
                    }
                }
                // Check staff
                const staff = Object.values(APP.staff).find(s => s.username === username && s.password === password && !s.deleted);
                if (staff) {
                    if (type === 'teacher' && staff.role === 'teacher') {
                        APP.currentUser = { role: 'teacher', staff: staff };
                        renderApp();
                        return;
                    } else if (type === 'management' && (staff.role === 'management' || staff.role === 'committee')) {
                        APP.currentUser = { role: 'management', staff: staff };
                        renderApp();
                        return;
                    }
                }
                errorEl.textContent = 'തെറ്റായ യൂസർനെയിം അല്ലെങ്കിൽ പാസ്‌വേർഡ്';

            }
        } catch (e) {
            errorEl.textContent = 'ലോഗിൻ പരാജയപ്പെട്ടു: ' + e.message;
            errorEl.classList.remove('hidden');
        }
    });
}

// ========== GLOBAL FUNCTIONS ==========
window.toggleAccordion = function(id) {
    const el = document.getElementById('acc_' + id);
    const icon = document.getElementById('icon_' + id);
    if (el) {
        el.classList.toggle('hidden');
        icon.classList.toggle('fa-chevron-down');
        icon.classList.toggle('fa-chevron-up');
    }
};

window.saveShiftMapping = function() {
    const shifts = { 1: [], 2: [], 3: [] };
    for (let s of [1,2,3]) {
        document.querySelectorAll(`.shift${s}:checked`).forEach(cb => shifts[s].push(parseInt(cb.value)));
    }
    APP.shiftClassMapping.shifts = shifts;
    saveToFirebase('shiftClassMapping', APP.shiftClassMapping);
    showPopup('✅ ഷിഫ്റ്റ് ലിങ്കിംഗ് സേവ് ചെയ്തു');
};

window.addStaff = function() {
    const name = document.getElementById('staffName').value.trim();
    const username = document.getElementById('staffUsername').value.trim();
    const password = document.getElementById('staffPassword').value.trim();
    const role = document.getElementById('staffRole').value;
    const classes = [...document.querySelectorAll('.staffClass:checked')].map(cb => parseInt(cb.value));
    if (!name || !username || !password) { showPopup('എല്ലാ ഫീൽഡുകളും പൂരിപ്പിക്കുക'); return; }
    if (classes.length < 1 || classes.length > 4) { showPopup('1 മുതൽ 4 ക്ലാസുകൾ വരെ തിരഞ്ഞെടുക്കുക'); return; }
    const id = 'staff_' + Date.now();
    APP.staff[id] = { id, name, username, password, classes, role, deleted: false };
    saveToFirebase('staff', APP.staff);
    showPopup('✅ ജീവനക്കാരനെ ചേർത്തു');
    renderApp();
};

window.deleteStaff = function(id) {
    if (confirm('ഈ ജീവനക്കാരനെ നീക്കം ചെയ്യണോ?')) {
        if (APP.staff[id]) APP.staff[id].deleted = true;
        saveToFirebase('staff', APP.staff);
        showPopup('🗑️ ജീവനക്കാരനെ നീക്കം ചെയ്തു');
        renderApp();
    }
};

window.markAttendance = function(reg, status) {
    const date = document.getElementById('attDate')?.value || new Date().toISOString().split('T')[0];
    const cls = document.getElementById('attClass')?.value || 1;
    if (!APP.attendance[date]) APP.attendance[date] = {};
    if (!APP.attendance[date][cls]) APP.attendance[date][cls] = {};
    APP.attendance[date][cls][reg] = status;
    saveToFirebase('attendance', APP.attendance);
    showPopup(`✅ ${status === 'present' ? 'Present' : 'Absent'} മാർക്ക് ചെയ്തു`);
};

window.addHoliday = function() {
    const reason = document.getElementById('holidayReason').value.trim();
    const date = document.getElementById('holidayDate').value;
    const shift = document.getElementById('holidayShift').value;
    if (!reason || !date) { showPopup('കാരണം, തീയതി നൽകുക'); return; }
    const id = 'hol_' + Date.now();
    APP.holidays[id] = { id, reason, date, shift };
    saveToFirebase('holidays', APP.holidays);
    showPopup('✅ അവധി പ്രഖ്യാപിച്ചു');
    renderApp();
};

window.deleteHoliday = function(id) {

window.restoreData = function() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const data = JSON.parse(ev.target.result);
                for (let key of ['students','staff','fees','attendance','holidays','announcements','examTimetables','feeQR','complaints','marks','shiftClassMapping','staffAttendance']) {
                    if (data[key]) APP[key] = data[key];
                }
                saveAllToFirebase();
                showPopup('✅ ഡാറ്റ റിസ്റ്റോർ ചെയ്തു');
                renderApp();
            } catch (err) {
                showPopup('❌ തെറ്റായ JSON ഫയൽ');
            }
        };
        reader.readAsText(file);
    };
    input.click();
};

window.showPopup = function(msg) {
    const div = document.createElement('div');
    div.className = 'popup glass p-4 rounded-xl border border-white/10 text-sm';
    div.innerHTML = msg;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 4000);
};

// ========== FIREBASE HELPERS ==========
function saveToFirebase(path, data) {
    if (!APP.db) return;
    try {
        APP.db.ref(path).set(data);
    } catch (e) { console.warn('Save error:', e); }
}

function saveAllToFirebase() {
    if (!APP.db) return;
    try {
        for (let key of ['students','staff','fees','attendance','holidays','announcements','examTimetables','feeQR','complaints','marks','shiftClassMapping','staffAttendance']) {
            APP.db.ref(key).set(APP[key]);
        }
    } catch (e) { console.warn('Save all error:', e); }
}

function loadFromFirebase(path) {
    if (!APP.db) return Promise.resolve();
    return APP.db.ref(path).once('value').then(snap => snap.val());
}

// ========== INIT ==========
async function initApp() {
    try {
        const config = getFirebaseConfig();
        APP.db = initFirebase(config);
        APP.config = config;

        // Load all data
        const [students, staff, fees, attendance, holidays, announcements, examTimetables, feeQR, complaints, marks, shiftClassMapping, staffAttendance] = await Promise.all([
            loadFromFirebase('students'),
            loadFromFirebase('staff'),
            loadFromFirebase('fees'),
            loadFromFirebase('attendance'),
            loadFromFirebase('holidays'),
            loadFromFirebase('announcements'),
            loadFromFirebase('examTimetables'),
            loadFromFirebase('feeQR'),
            loadFromFirebase('complaints'),
            loadFromFirebase('marks'),
            loadFromFirebase('shiftClassMapping'),
            loadFromFirebase('staffAttendance')
        ]);

        // Merge with initial data
        if (!students || Object.keys(students).length === 0) {
            const initial = {};
            for (let s of INITIAL_STUDENTS) {
                initial[s[0]] = { reg: s[0], name: s[1], father: s[2], dob: s[3], phone: s[4], cls: s[5], shift: s[6], deleted: false };
            }
            APP.students = initial;
            await APP.db.ref('students').set(initial);
        } else {
            APP.students = students;
        }

        APP.staff = staff || {};
        APP.fees = fees || {};
        APP.attendance = attendance || {};
        APP.holidays = holidays || {};
        APP.announcements = announcements || {};
        APP.examTimetables = examTimetables || {};
        APP.feeQR = feeQR || {};
        APP.complaints = complaints || {};
        APP.marks = marks || {};
        APP.shiftClassMapping = shiftClassMapping || { shifts: { 1: [1,2,3,4], 2: [5,6,7,8], 3: [9,10,11,12] } };
        APP.staffAttendance = staffAttendance || {};

        APP.loaded = true;
        renderApp();
    } catch (e) {
        console.error('Init error:', e);
        document.getElementById('app').innerHTML = `
            <div class="min-h-screen flex items-center justify-center p-4">
                <div class="glass p-6 rounded-2xl max-w-md w-full text-center">
                    <div class="text-red-400 text-4xl mb-3">⚠️</div>
                    <h2 class="text-xl font-bold text-red-300">ഫയർബേസ് കണക്ഷൻ പരാജയപ്പെട്ടു</h2>
                    <p class="text-gray-400 text-sm mt-2">ദയവായി വിവരങ്ങൾ പരിശോധിച്ച് വീണ്ടും ശ്രമിക്കുക.</p>
                    <button onclick="initApp()" class="mt-4 bg-amber-500 hover:bg-amber-400 text-slate-900 px-6 py-2 rounded-lg font-bold">🔄 വീണ്ടും ശ്രമിക്കുക</button>
                </div>
            </div>
        `;
    }
}

// ========== START ==========
document.addEventListener('DOMContentLoaded', initApp);
</script>
