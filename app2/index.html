// ======================== UTILITY ==========================
function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
function formatDate(d) { const dt = new Date(d); return dt.toLocaleDateString('en-IN'); }
function getMonthName(m) { const months = ['ജനുവരി','ഫെബ്രുവരി','മാർച്ച്','ഏപ്രിൽ','മെയ്','ജൂൺ','ജൂലൈ','ഓഗസ്റ്റ്','സെപ്റ്റംബർ','ഒക്ടോബർ','നവംബർ','ഡിസംബർ']; return months[m] || m; }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function getShiftLabel(s) { return ['','ഷിഫ്റ്റ് 1','ഷിഫ്റ്റ് 2','ഷിഫ്റ്റ് 3'][s] || s; }

// ======================== FIREBASE SYNC ==========================
function syncAll() {
    const studentMap = {};
    students.forEach(s => { studentMap[s.reg] = { ...s }; });
    db.ref('students').set(studentMap);
    const staffMap = {};
    staff.forEach(s => { staffMap[s.id] = { ...s }; });
    db.ref('staff').set(staffMap);
    db.ref('fees').set(fees);
    db.ref('attendance').set(attendance);
    db.ref('holidays').set(holidays);
    const annMap = {};
    announcements.forEach(a => { annMap[a.id] = a; });
    db.ref('announcements').set(annMap);
    db.ref('examTimetables').set(examTimetables);
    db.ref('feeQR').set(feeQR);
    const compMap = {};
    complaints.forEach(c => { compMap[c.id] = c; });
    db.ref('complaints').set(compMap);
    db.ref('marks').set(marks);
    db.ref('shiftClassMapping').set(shiftClassMapping);
    db.ref('staffAttendance').set(staffAttendance);
}

function loadFromFirebase() {
    return new Promise((resolve) => {
        db.ref('/').once('value').then(snapshot => {
            const data = snapshot.val() || {};
            if (data.students) {
                const vals = Object.values(data.students);
                students = vals.filter(s => !s.deleted);
            } else { students = INITIAL_STUDENTS.map(s => ({ ...s })); syncAll(); }
            if (data.staff) {
                const vals = Object.values(data.staff);
                staff = vals.filter(s => !s.deleted);
            } else { staff = []; }
            fees = data.fees || {};
            attendance = data.attendance || {};
            holidays = data.holidays || [];
            if (data.announcements) announcements = Object.values(data.announcements);
            else announcements = [];
            examTimetables = data.examTimetables || {};
            feeQR = data.feeQR || { monthlyFee: 0, googlePay: '', qrBase64: '' };
            if (data.complaints) complaints = Object.values(data.complaints);
            else complaints = [];
            marks = data.marks || {};
            shiftClassMapping = data.shiftClassMapping || { shifts: { 1: { time: '', classes: [] }, 2: { time: '', classes: [] }, 3: { time: '', classes: [] } } };
            staffAttendance = data.staffAttendance || {};
            resolve();
        }).catch(() => {
            students = INITIAL_STUDENTS.map(s => ({ ...s }));
            staff = [];
            fees = {};
            attendance = {};
            holidays = [];
            announcements = [];
            examTimetables = {};
            feeQR = { monthlyFee: 0, googlePay: '', qrBase64: '' };
            complaints = [];
            marks = {};
            shiftClassMapping = { shifts: { 1: { time: '', classes: [] }, 2: { time: '', classes: [] }, 3: { time: '', classes: [] } } };
            staffAttendance = {};
            resolve();
        });
    });
}

// ======================== AUTH ==========================
function loginUser(type, username, password, reg) {
    return new Promise((resolve, reject) => {
        if (type === 'sadhar') {
            if (username === 'sadhar' && password === '6682') {
                currentUser = { type: 'sadhar', username: 'sadhar' };
                resolve();
            } else reject('തെറ്റായ യൂസർനെയിം അല്ലെങ്കിൽ പാസ്‌വേർഡ്');
        } else if (type === 'teacher') {
            const found = staff.find(s => s.username === username && s.password === password && s.role === 'teacher' && !s.deleted);
            if (found) {
                currentUser = { type: 'teacher', username, id: found.id, classes: found.classes || [] };
                resolve();
            } else reject('തെറ്റായ വിവരങ്ങൾ അല്ലെങ്കിൽ നീക്കം ചെയ്യപ്പെട്ട അധ്യാപകൻ');
        } else if (type === 'management') {
            const found = staff.find(s => s.username === username && s.password === password && (s.role === 'management' || s.role === 'committee') && !s.deleted);
            if (found) {
                currentUser = { type: 'management', username };
                resolve();
            } else reject('തെറ്റായ വിവരങ്ങൾ അല്ലെങ്കിൽ നീക്കം ചെയ്യപ്പെട്ടു');
        } else if (type === 'parent') {
            const student = students.find(s => s.reg == reg && !s.deleted);
            if (student) {
                currentUser = { type: 'parent', reg: parseInt(reg), student: student };
                resolve();
            } else reject('തെറ്റായ രജിസ്റ്റർ നമ്പർ അല്ലെങ്കിൽ നീക്കം ചെയ്യപ്പെട്ടു');
        } else reject('അസാധുവായ ലോഗിൻ തരം');
    });
}

    const user = currentUser;
    if (!user) return;
    document.getElementById('userRoleDisplay').textContent = user.type === 'sadhar' ? 'സദർ' : user.type === 'teacher' ? 'അധ്യാപകൻ' : user.type === 'management' ? 'മാനേജ്മെന്റ്' : 'രക്ഷിതാവ്';
    document.querySelectorAll('.panel-content').forEach(el => el.classList.add('hidden'));
    if (user.type === 'sadhar') {
        document.getElementById('sadharPanel').classList.remove('hidden');
        renderSadharPanel();
    } else if (user.type === 'teacher') {
        document.getElementById('teacherPanel').classList.remove('hidden');
        renderTeacherPanel();
    } else if (user.type === 'management') {
        document.getElementById('managementPanel').classList.remove('hidden');
        renderManagementPanel();
    } else if (user.type === 'parent') {
        document.getElementById('parentPanel').classList.remove('hidden');
        renderParentPanel();
    }
    document.querySelectorAll('.tab-btn').forEach(btn => {
        const panel = btn.dataset.panel;
        const isActive = (user.type === 'sadhar' && panel === 'sadharPanel') ||
                         (user.type === 'teacher' && panel === 'teacherPanel') ||
                         (user.type === 'management' && panel === 'managementPanel') ||
                         (user.type === 'parent' && panel === 'parentPanel');
        btn.className = `tab-btn px-5 py-2 text-sm font-medium transition ${isActive ? 'tab-active' : 'tab-inactive'}`;
    });
}

function renderAccordionItem(id, title, contentHtml) {

// ---- Shift & Class ----
function renderShiftClass() {
    let html = `<div class="space-y-3 text-sm">`;
    for (let s=1; s<=3; s++) {
        const shiftData = shiftClassMapping.shifts[s] || { time: '', classes: [] };
        html += `<div class="flex items-center gap-2 flex-wrap"><span class="font-bold w-24">ഷിഫ്റ്റ് ${s}</span>
        <input type="text" id="shiftTime_${s}" placeholder="സമയം" value="${shiftData.time || ''}" class="border rounded px-2 py-1 flex-1 min-w-[100px]" />
        <span class="text-xs text-gray-500">ക്ലാസുകൾ:</span>
        <div class="flex flex-wrap gap-1">`;
        for (let c=1; c<=12; c++) {
            const checked = shiftData.classes.includes(c) ? 'checked' : '';
            html += `<label class="inline-flex items-center gap-1"><input type="checkbox" class="shift-class-check" data-shift="${s}" data-class="${c}" ${checked} /> ${c}</label>`;
        }
        html += `</div></div>`;
    }
    html += `<button onclick="saveShiftClass()" class="btn-primary text-white px-4 py-2 rounded-xl text-sm mt-3">💾 സേവ് ചെയ്യുക</button></div>`;
    return html;
}
window.saveShiftClass = function() {
    for (let s=1; s<=3; s++) {
        const time = document.getElementById(`shiftTime_${s}`).value;
        const checked = document.querySelectorAll(`.shift-class-check[data-shift="${s}"]:checked`);
        const classes = Array.from(checked).map(el => parseInt(el.dataset.class));
        shiftClassMapping.shifts[s] = { time, classes };
    }
    syncAll();
    showPopup('വിജയം', 'ഷിഫ്റ്റ് ക്രമീകരണങ്ങൾ സേവ് ചെയ്തു');
};

function renderSadharAttendance() {
    let html = `<div class="space-y-2 text-sm">
        <div class="flex gap-2 flex-wrap"><input type="date" id="attDate" value="${todayStr()}" class="border rounded px-2 py-1" />

    </div>`;

}
window.loadAttendanceClass = function() {
    const cls = document.getElementById('attClass').value;
    const date = document.getElementById('attDate').value;
    if (!cls || !date) return;
    const container = document.getElementById('attendanceList');
    const clsStudents = students.filter(s => s.cls == cls && !s.deleted);
    if (!clsStudents.length) { container.innerHTML = '<p class="text-gray-500">ഈ ക്ലാസിൽ കുട്ടികളില്ല</p>'; return; }
    let html = `<div class="font-bold">${cls}-ാം ക്ലാസ് - ${date}</div>`;
    clsStudents.forEach(s => {
        const key = `${date}_${s.reg}`;
        const status = attendance[key] || 'present';
        html += `<div class="flex justify-between items-center border-b py-1 flex-wrap gap-1">
            <span><span class="font-medium">${s.name}</span> (${s.reg})</span>
            <div class="flex gap-2 flex-wrap">
                <label><input type="radio" name="att_${s.reg}" value="present" ${status==='present'?'checked':''} /> Present</label>
                <label><input type="radio" name="att_${s.reg}" value="absent" ${status==='absent'?'checked':''} /> Absent</label>
                <button onclick="sendWhatsAppAbsent('${s.reg}','${s.name}','${s.father}','${s.phone}','${date}')" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> അറിയിപ്പ്</button>
            </div>
        </div>`;
    });
    container.innerHTML = html;
};
window.saveAttendance = function() {
    const date = document.getElementById('attDate').value;
    const cls = document.getElementById('attClass').value;
    if (!date || !cls) return;
    const radios = document.querySelectorAll(`#attendanceList input[type="radio"]:checked`);
    radios.forEach(r => {
        const reg = parseInt(r.name.split('_')[1]);
        const key = `${date}_${reg}`;
        attendance[key] = r.value;
    });
    syncAll();
    showPopup('വിജയം', 'ഹാജർ സേവ് ചെയ്തു');
};
window.sendWhatsAppAbsent = function(reg, name, father, phone, date) {
    const msg = `അസ്സലാമു അലൈക്കും ${father} രക്ഷിതാവേ, ${date} തീയതിയിൽ ${name} (Reg: ${reg}) ഹാജരില്ല. ദയവായി ശ്രദ്ധിക്കുക. - മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്`;
    window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`, '_blank');
};

    </div>`;

window.addExamEntry = function() {
    const cls = document.getElementById('examClass').value;
    const type = document.getElementById('examType').value;
    const subject = document.getElementById('examSubject').value.trim();
    const date = document.getElementById('examDate').value;
    const time = document.getElementById('examTime').value;
    if (!cls || !subject || !date) { showPopup('പിശക്', 'എല്ലാം പൂരിപ്പിക്കുക'); return; }
    if (!examTimetables[cls]) examTimetables[cls] = {};
    if (!examTimetables[cls][type]) examTimetables[cls][type] = [];
    examTimetables[cls][type].push({ subject, date, time, id: generateId() });
    syncAll();
    renderExamList();
    showPopup('വിജയം', 'ടൈംടേബിൾ ചേർത്തു');
};
function renderExamList() {
    const cls = document.getElementById('examClass').value;
    const type = document.getElementById('examType').value;
    const container = document.getElementById('examList');
    if (!cls || !type || !examTimetables[cls] || !examTimetables[cls][type]) { container.innerHTML = ''; return; }
    let html = '';
    examTimetables[cls][type].forEach((e, i) => {
        html += `<div class="flex justify-between border-b py-1"><span>${e.subject} - ${e.date} ${e.time||''}</span><button onclick="removeExamEntry('${cls}','${type}','${i}')" class="text-red-500 text-sm"><i class="fas fa-trash"></i></button></div>`;
    });
    container.innerHTML = html;
}
window.removeExamEntry = function(cls, type, idx) {
    examTimetables[cls][type].splice(idx, 1);
    syncAll();
    renderExamList();
};
window.sendExamAlert = function() {
    const cls = document.getElementById('examClass').value;
    const type = document.getElementById('examType').value;
    if (!cls || !type) { showPopup('പിശക്', 'ക്ലാസും പരീക്ഷ തരവും തിരഞ്ഞെടുക്കുക'); return; }
    const entries = examTimetables[cls]?.[type] || [];
    if (!entries.length) { showPopup('പിശക്', 'ടൈംടേബിൾ ഇല്ല'); return; }
    let msg = `📢 *മമ്പഉൽ ഉലൂം മദ്റസ - ${cls}-ാം ക്ലാസ് ${type} പരീക്ഷ ടൈംടേബിൾ*\n`;
    entries.forEach(e => { msg += `📚 ${e.subject} - ${e.date} ${e.time||''}\n`; });
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
};

}

// ======================== LOGIN & NAV ==========================
document.getElementById('loginTypeSelect').addEventListener('change', renderLoginFields);
renderLoginFields();

document.getElementById('loginBtn').addEventListener('click', async function() {
    const type = document.getElementById('loginTypeSelect').value;
    const errorEl = document.getElementById('loginError');
    errorEl.classList.add('hidden');
    try {
        if (type === 'sadhar') {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            await loginUser('sadhar', username, password);
        } else if (type === 'teacher') {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            await loginUser('teacher', username, password);
        } else if (type === 'management') {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            await loginUser('management', username, password);
        } else if (type === 'parent') {
            const reg = document.getElementById('loginReg').value.trim();
            if (!reg) throw new Error('രജിസ്റ്റർ നമ്പർ നൽകുക');
            await loginUser('parent', '', '', reg);
        }
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('mainPanel').classList.remove('hidden');
        renderPanels();
    } catch (e) {
        errorEl.textContent = e.message || 'ലോഗിൻ പരാജയപ്പെട്ടു';
        errorEl.classList.remove('hidden');
    }
});

document.getElementById('logoutBtn').addEventListener('click', function() {
    if (confirm('ലോഗൗട്ട് ചെയ്യണോ?')) {
        currentUser = null;
        document.getElementById('loginSection').classList.remove('hidden');
        document.getElementById('mainPanel').classList.add('hidden');
    }
});

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        const panelId = this.dataset.panel;
        const user = currentUser;
        if (!user) return;
        if ((user.type === 'sadhar' && panelId !== 'sadharPanel') ||
            (user.type === 'teacher' && panelId !== 'teacherPanel') ||
            (user.type === 'management' && panelId !== 'managementPanel') ||
            (user.type === 'parent' && panelId !== 'parentPanel')) {
            showPopup('അനുവാദമില്ല', 'നിങ്ങൾക്ക് ഈ പാനൽ കാണാൻ അവകാശമില്ല');
            return;
        }
        document.querySelectorAll('.panel-content').forEach(el => el.classList.add('hidden'));
        document.getElementById(panelId).classList.remove('hidden');
        if (panelId === 'sadharPanel') renderSadharPanel();
        else if (panelId === 'teacherPanel') renderTeacherPanel();
        else if (panelId === 'managementPanel') renderManagementPanel();
        else if (panelId === 'parentPanel') renderParentPanel();
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.className = `tab-btn px-5 py-2 text-sm font-medium transition ${b.dataset.panel === panelId ? 'tab-active' : 'tab-inactive'}`;
        });
    });
});

// ======================== INIT ==========================
async function init() {
    await loadFromFirebase();
    document.getElementById('loginSection').classList.remove('hidden');
    document.getElementById('mainPanel').classList.add('hidden');
}
init();
console.log('മമ്പഉൽ ഉലൂം മദ്റസ ആപ്പ് ലോഡായി ✅');
</script>
</body>
