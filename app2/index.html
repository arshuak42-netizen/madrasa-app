<!doctype html>
<html lang="ml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Malayalam Madrasa - Safe SPA</title>
  <style>
    /* Simple responsive styles (keep similar to your original) */
    :root{
      --bg:#0f1720;
      --card:#0b1220;
      --accent:#22c55e;
      --text:#e6eef8;
      --muted:#94a3b8;
    }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Noto Sans Malayalam',sans-serif}
    .app {
      min-height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:36px 16px;
      box-sizing:border-box;
    }
    header {
      width:100%;
      max-width:900px;
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }
    .brand {font-weight:700;font-size:1.1rem}
    nav {display:flex;gap:8px}
    button.nav-btn {
      background:transparent;color:var(--text);border:1px solid rgba(255,255,255,0.06);padding:8px 12px;border-radius:8px;cursor:pointer;
    }
    .container {
      width:100%;
      max-width:900px;
      display:flex;
      gap:20px;
      align-items:flex-start;
      justify-content:center;
    }
    .panel {
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:14px;padding:28px;width:100%;
      box-shadow:0 8px 30px rgba(2,6,23,0.6);
    }
    .login-box { max-width:450px;margin:0 auto;text-align:center;background:white;color:#0b1220;padding:28px;border-radius:12px; }
    .login-box h2{margin:0 0 12px;font-size:1.25rem}
    label{display:block;text-align:left;margin:10px 0 6px;color:var(--muted);font-size:0.9rem}
    input[type="text"],input[type="password"],select{
      width:100%;padding:10px;border-radius:8px;border:1px solid #e6eef8;box-sizing:border-box;font-size:1rem;
    }
    .actions{display:flex;gap:8px;margin-top:14px;justify-content:center}
    button.btn {background:var(--accent);color:#062219;border:none;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:600}
    button.ghost{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.04)}
    .notice{color:var(--muted);font-size:0.95rem;margin-top:12px}
    /* Small helper for debug list */
    pre.debug{background:#071226;color:#9cc7ff;padding:10px;border-radius:8px;overflow:auto;max-height:200px}
    footer{margin-top:18px;color:var(--muted);font-size:0.85rem}
    @media (max-width:480px){ .container{padding:0 6px} header{gap:6px} }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header>
      <div class="brand">മദ്രസാ മാനേജ്‌മെന്റ്</div>
      <nav role="navigation" aria-label="പ്രധാന നാവിഗേഷൻ">
        <!-- Use buttons for internal navigation -->
        <button class="nav-btn" data-route="dashboard">ഡാഷ്‌ബോർഡ്</button>
        <button class="nav-btn" data-route="attendance">attendance</button>
        <button class="nav-btn" data-route="fees">fees</button>
        <button class="nav-btn" data-route="notices">notices</button>
        <button class="nav-btn" id="open-signup">Sign Up</button>
        <button class="nav-btn" id="open-login">Log In</button>
      </nav>
    </header>

    <main class="container">
      <section class="panel" id="main-panel" aria-live="polite">
        <!-- App content will be rendered here -->
        <h1 id="page-title">സ്വാഗതം</h1>
        <p class="notice">ഇത് ഒരു local test SPA ആണ്. Sign Up / Log In ബട്ടനുകൾ ഉപയോഗിച്ച് പരീക്ഷിക്കുക.</p>

        <div id="view-root">
          <!-- default dashboard -->
          <div id="dashboard-view">
            <p>മൊത്തം വിദ്യാർത്ഥികൾ: <strong id="total-students">0</strong></p>
          </div>

          <!-- login modal (hidden by default) -->
          <div id="modal-container" style="display:none;margin-top:16px">
            <div class="login-box" role="dialog" aria-modal="true" aria-labelledby="login-title">
              <h2 id="login-title">ലോഗിൻ</h2>
              <label for="login-phone">ഫോൺ നമ്പർ</label>
              <input id="login-phone" type="text" placeholder="9999999999" inputmode="numeric" />
              <label for="login-pass">Password</label>
              <input id="login-pass" type="password" placeholder="Password" />
              <div class="actions">
                <button class="btn" id="login-submit">Log In</button>
                <button class="ghost" id="login-cancel">Cancel</button>
              </div>
              <p class="notice" style="margin-top:10px">അടിസ്ഥാന ടെസ്റ്റ് اعتبار only. No external redirects used.</p>
            </div>
          </div>

          <!-- signup modal -->
          <div id="signup-container" style="display:none;margin-top:16px">
            <div class="login-box" role="dialog" aria-modal="true" aria-labelledby="signup-title">
              <h2 id="signup-title">Sign Up</h2>
              <label for="su-name">പേര്</label>
              <input id="su-name" type="text" placeholder="നിങ്ങളുടെ പേര്" />
              <label for="su-phone">ഫോൺ നമ്പർ</label>
              <input id="su-phone" type="text" placeholder="9999999999" />
              <label for="su-pass">Password</label>
              <input id="su-pass" type="password" placeholder="Password" />
              <div class="actions">
                <button class="btn" id="signup-submit">Create Account</button>
                <button class="ghost" id="signup-cancel">Cancel</button>
              </div>
              <p class="notice">Account data saved locally (localStorage).</p>
            </div>
          </div>

        </div>

        <pre class="debug" id="debug-output" style="display:none"></pre>
      </section>
    </main>

    <footer>© മദ്രസാ • Local demo</footer>
  </div>

  <script>
    // --- Simple SPA routing (no document.location assignment) ---
    const state = { current: 'dashboard' };

    function render() {
      const title = document.getElementById('page-title');
      const total = document.getElementById('total-students');
      title.textContent = state.current === 'dashboard' ? 'ഡാഷ്‌ബോർഡ്' : state.current;
      // sample: count stored students
      const students = JSON.parse(localStorage.getItem('students')||'[]');
      total.textContent = students.length;
      // hide modals by default
      document.getElementById('modal-container').style.display = 'none';
      document.getElementById('signup-container').style.display = 'none';
      if (state.current === 'login') document.getElementById('modal-container').style.display = 'block';
      if (state.current === 'signup') document.getElementById('signup-container').style.display = 'block';
    }

    function navigate(route) {
      // Internal navigation using History API (no direct location assignment)
      state.current = route || 'dashboard';
      history.pushState({route:state.current}, '', '#'+state.current);
      render();
    }

    window.addEventListener('popstate', (ev) => {
      if (ev.state && ev.state.route) {
        state.current = ev.state.route;
      } else {
        state.current = 'dashboard';
      }
      render();
    });

    // Wire nav buttons
    document.querySelectorAll('[data-route]').forEach(btn=>{
      btn.addEventListener('click', ()=> navigate(btn.getAttribute('data-route')));
    });

    document.getElementById('open-signup').addEventListener('click', ()=> navigate('signup'));
    document.getElementById('open-login').addEventListener('click', ()=> navigate('login'));

    // Simple signup/login (localStorage)
    function safeString(s){ return String(s||'').trim(); }
    document.getElementById('signup-submit').addEventListener('click', ()=>{
      const name = safeString(document.getElementById('su-name').value);
      const phone = safeString(document.getElementById('su-phone').value);
      const pass = safeString(document.getElementById('su-pass').value);
      if (!name || !phone || !pass) { alert('വിളിപാടി: എല്ലാ ഫീൽഡുകളും പൂരിപ്പിക്കുക'); return; }
      const users = JSON.parse(localStorage.getItem('mm_users')||'[]');
      if (users.find(u=>u.phone===phone)){ alert('Phone number already registered'); return; }
      users.push({name,phone,pass,role:'parent'});
      localStorage.setItem('mm_users', JSON.stringify(users));
      alert('Account created (local only)');
      navigate('dashboard');
    });

    document.getElementById('login-submit').addEventListener('click', ()=>{
      const phone = safeString(document.getElementById('login-phone').value);
      const pass = safeString(document.getElementById('login-pass').value);
      const users = JSON.parse(localStorage.getItem('mm_users')||'[]');
      const user = users.find(u=>u.phone===phone && u.pass===pass);
      if (!user){ alert('Invalid credentials'); return; }
      localStorage.setItem('mm_current_user', JSON.stringify(user));
      alert('Logged in as '+user.name);
      navigate('dashboard');
    });

    document.getElementById('login-cancel').addEventListener('click', ()=> navigate('dashboard'));
    document.getElementById('signup-cancel').addEventListener('click', ()=> navigate('dashboard'));

    // -- Auto-fix/checker for empty href anchors (will replace them with buttons)
    function fixEmptyHrefAnchors() {
      const anchors = Array.from(document.querySelectorAll('a'));
      const converted = [];
      anchors.forEach(a=>{
        const href = (a.getAttribute('href') || '').trim();
        if (!href) {
          // Replace with a button to preserve event listeners visually
          const btn = document.createElement('button');
          btn.className = a.className || '';
          btn.innerHTML = a.innerHTML || a.textContent || 'link';
          // copy dataset
          Array.from(a.attributes).forEach(attr=>{
            if (attr.name.startsWith('data-')) btn.setAttribute(attr.name, attr.value);
          });
          a.parentNode.replaceChild(btn, a);
          converted.push(btn);
        }
      });
      return converted;
    }

    // -- Debug utility to list any anchor problems and show in a debug panel
    function debugAnchors() {
      const anchors = Array.from(document.querySelectorAll('a,link'));
      const problems = [];
      anchors.forEach(el=>{
        const tag = el.tagName.toLowerCase();
        const href = el.getAttribute('href');
        if (!href || href.trim()==='') problems.push({tag, outer: el.outerHTML.slice(0,200)});
      });
      const dbg = document.getElementById('debug-output');
      if (problems.length) {
        dbg.style.display = 'block';
        dbg.textContent = 'Found empty href tags (auto-fixed if anchors):\\n' + problems.map(p=>p.tag + ' — ' + p.outer).join('\\n\\n');
        console.warn('Empty href/link elements found. See debug output.');
        // run fixer for empty anchors only
        fixEmptyHrefAnchors();
      } else {
        dbg.style.display = 'none';
      }
    }

    // Seed sample students (only if none)
    if (!localStorage.getItem('students')) {
      const sample = [
        {id:1,name:'അബ്ദുൽ റഹ്‌മാന്‍',class:1,shift:'morning'},
        {id:2,name:'ഫാത്തിമ',class:2,shift:'evening'}
      ];
      localStorage.setItem('students', JSON.stringify(sample));
    }

    // Initialize app
    (function init(){
      // Run debug check for empty hrefs
      debugAnchors();

      // On load, if there's a hash route, go there
      const hash = location.hash && location.hash.slice(1);
      state.current = hash || 'dashboard';
      history.replaceState({route:state.current}, '', '#'+state.current);
      render();
    })();

    // Example safe external open (only used if you intentionally want to open external URL)
    function openExternal(url) {
      // Confirm before leaving app context
      if (!url || typeof url !== 'string') return;
      const ok = confirm('ഈ പ്രവർത്തനം നിങ്ങളുടെ ബ്രൗസര്‍ പുതിയ ടാബിൽ തുറക്കും. തുടരണം?');
      if (ok) window.open(url, '_blank', 'noopener');
    }

    // Expose for debugging (optional)
    window.mmApp = { navigate, debugAnchors, fixEmptyHrefAnchors, openExternal };

  </script>
</body>
</html>
