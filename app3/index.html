        // ---------- FIREBASE READ/WRITE ----------
        function fbRead(path) {
            return new Promise((res,rej)=>{
                if(!database) return rej('Firebase not ready');
                database.ref(path).once('value').then(snap=>res(snap.val())).catch(rej);
            });
        }
        function fbWrite(path, data) {
            return new Promise((res,rej)=>{
                if(!database) return rej('Firebase not ready');
                database.ref(path).set(data).then(res).catch(rej);
            });
        }
        function fbUpdate(path, data) {
            return new Promise((res,rej)=>{
                if(!database) return rej('Firebase not ready');
                database.ref(path).update(data).then(res).catch(rej);
            });
        }

        async function loadAllData() {
            try {
                const [students, staff, fees, att, hols, ann, exams, qr, comps, marks, shifts, stfAtt] = await Promise.all([
                    fbRead('students'), fbRead('staff'), fbRead('fees'), fbRead('attendance'),
                    fbRead('holidays'), fbRead('announcements'), fbRead('examTimetables'), fbRead('feeQR'),
                    fbRead('complaints'), fbRead('marks'), fbRead('shiftClassMapping'), fbRead('staffAttendance')
                ]);
                // merge with initial
                const initMap = {};
                INITIAL_STUDENTS.forEach(s=>{ initMap[s.reg]=s; });
                if(students) {
                    allStudents = Object.values(students).map(s=>({...s}));
                    // ensure all initial exist
                    INITIAL_STUDENTS.forEach(is=>{
                        if(!allStudents.find(s=>s.reg===is.reg)) allStudents.push({...is});
                    });
                } else {
                    allStudents = INITIAL_STUDENTS.map(s=>({...s}));
                }
                allStaff = staff ? Object.values(staff).map(s=>({...s})) : [];
                allFees = fees || {};
                allAttendance = att || {};
                allHolidays = hols ? Object.values(hols) : [];
                allAnnouncements = ann ? Object.values(ann) : [];
                allExamTimetables = exams || {};
                feeQR = qr || { monthlyFee: 200, googlePay: "", qrBase64: "" };
                complaints = comps ? Object.values(comps) : [];
                allMarks = marks || {};
                shiftClassMapping = shifts || { 1:[],2:[],3:[] };
                staffAttendance = stfAtt || {};
                // ensure shift mapping has some default if empty
                if(!shiftClassMapping[1] || shiftClassMapping[1].length===0) {
                    shiftClassMapping = { 1:[1,3,5,7,9,11], 2:[2,4,6,8,10,12], 3:[11,12] };
                    await fbWrite('shiftClassMapping', shiftClassMapping);
                }
                // push initial students to firebase if missing
                for(let s of INITIAL_STUDENTS) {
                    await fbUpdate(`students/${s.reg}`, s);
                }
                // ensure sadhar exists
                const sadharExists = allStaff.find(st=>st.username==='sadhar');
                if(!sadharExists) {
                    const sadhar = { id:'sadhar_6682', name:'സദർ', username:'sadhar', password:'admin123', role:'sadhar', classes:[], photo:'' };
                    allStaff.push(sadhar);
                    await fbUpdate(`staff/${sadhar.id}`, sadhar);
                }
                // ensure default staff for management if not exists
                const mgmtExists = allStaff.find(st=>st.username==='manager');
                if(!mgmtExists) {
                    const mgr = { id:'mgr_001', name:'മാനേജർ', username:'manager', password:'manager123', role:'management', classes:[], photo:'' };
                    allStaff.push(mgr);
                    await fbUpdate(`staff/${mgr.id}`, mgr);
                }
                return true;
            } catch(e) {
                console.warn('Firebase load error, using fallback', e);
                // fallback: use initial data
                allStudents = INITIAL_STUDENTS.map(s=>({...s}));
                if(!allStaff.find(st=>st.username==='sadhar')) {
                    allStaff.push({ id:'sadhar_6682', name:'സദർ', username:'sadhar', password:'admin123', role:'sadhar', classes:[], photo:'' });
                }
                if(!allStaff.find(st=>st.username==='manager')) {
                    allStaff.push({ id:'mgr_001', name:'മാനേജർ', username:'manager', password:'manager123', role:'management', classes:[], photo:'' });
                }
                shiftClassMapping = { 1:[1,3,5,7,9,11], 2:[2,4,6,8,10,12], 3:[11,12] };
                feeQR = { monthlyFee:200, googlePay:'', qrBase64:'' };
                return true;
            }
        }

        async function handleLogin() {
            const type = loginTypeSelect.value;
            loginError.classList.add('hidden');
            if(type === 'sadhar') {
                const u = document.getElementById('loginUsername').value.trim();
                const p = document.getElementById('loginPassword').value.trim();
                if(u==='sadhar' && p==='admin123') {
                    currentUser = { role:'sadhar', username:'sadhar', name:'സദർ' };
                    enterApp();
                    return;
                }
                loginError.textContent = '❌ തെറ്റായ യൂസർനെയിം / പാസ്‌വേർഡ്';
                loginError.classList.remove('hidden');
                return;
            }
            if(type === 'teacher' || type === 'management') {
                const u = document.getElementById('loginUsername').value.trim();
                const p = document.getElementById('loginPassword').value.trim();
                const staff = allStaff.find(s=>s.username===u && s.password===p && s.role===type);
                if(staff && !staff.deleted) {
                    currentUser = { role:staff.role, username:staff.username, name:staff.name, staffId:staff.id, classes:staff.classes||[] };
                    enterApp();
                    return;
                }
                loginError.textContent = '❌ യൂസർനെയിം / പാസ്‌വേർഡ് തെറ്റ് അല്ലെങ്കിൽ നീക്കം ചെയ്യപ്പെട്ടു';
                loginError.classList.remove('hidden');
                return;
            }
            if(type === 'parent') {
                const reg = document.getElementById('loginReg').value.trim();
                const student = allStudents.find(s=>s.reg===reg);
                if(student && !student.deleted) {
                    currentUser = { role:'parent', reg:reg, name:student.name, parentName:student.father, phone:student.phone };
                    enterApp();
                    return;
                }
                loginError.textContent = '❌ രജിസ്റ്റർ നമ്പർ കണ്ടെത്തിയില്ല';
                loginError.classList.remove('hidden');
            }
        }

            container.innerHTML = html;

            function renderExamTable() {
                const cls = document.getElementById('examCls').value;
                const type = document.getElementById('examType').value;
                const data = allExamTimetables[cls]?.[type] || [];
                let h = '';
                data.forEach((e,i)=>{
                    h+=`<div class="flex justify-between text-sm border-b py-1"><span>${e.subject} (${e.date} ${e.time})</span><button class="text-red-600 del-exam" data-cls="${cls}" data-type="${type}" data-idx="${i}">✖</button></div>`;
                });
                document.getElementById('examTableDisplay').innerHTML = h || 'ഇതുവരെ ഒന്നുമില്ല';
                document.querySelectorAll('.del-exam').forEach(b=>{
                    b.addEventListener('click', function(){
                        const cls=this.dataset.cls, type=this.dataset.type, idx=parseInt(this.dataset.idx);
                        if(!allExamTimetables[cls]) allExamTimetables[cls]={};
                        if(!allExamTimetables[cls][type]) allExamTimetables[cls][type]=[];
                        allExamTimetables[cls][type].splice(idx,1);
                        fbUpdate(`examTimetables/${cls}`, allExamTimetables[cls]);
                        renderExamTable();
                        showToast('നീക്കം ചെയ്തു','success');
                    });
                });
            }

            document.getElementById('addExamEntry')?.addEventListener('click', async function(){
                const cls = document.getElementById('examCls').value;
                const type = document.getElementById('examType').value;
                const subject = document.getElementById('examSubject').value.trim();
                const date = document.getElementById('examDate').value;
                const time = document.getElementById('examTime').value.trim();
                if(!cls||!subject||!date) return showToast('വിവരങ്ങൾ പൂരിപ്പിക്കുക','error');
                if(!allExamTimetables[cls]) allExamTimetables[cls]={};
                if(!allExamTimetables[cls][type]) allExamTimetables[cls][type]=[];
                allExamTimetables[cls][type].push({subject,date,time,id:Date.now()});
                await fbUpdate(`examTimetables/${cls}`, allExamTimetables[cls]);
                renderExamTable();
                showToast('✅ ടൈംടേബിൾ ചേർത്തു','success');
            });

            document.getElementById('sendExamAlert')?.addEventListener('click', function(){
                const cls = document.getElementById('examCls').value;
                const type = document.getElementById('examType').value;
                const data = allExamTimetables[cls]?.[type] || [];
                if(!data.length) return showToast('ടൈംടേബിൾ ഇല്ല','error');
                let msg = `📚 ${cls}-ാം ക്ലാസ്സ് ${type} പരീക്ഷാ ടൈംടേബിൾ:\n`;
                data.forEach(e=>{ msg+=`${e.subject}: ${e.date} ${e.time}\n`; });
                const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
                window.open(url,'_blank');
            });
            // initial render
            renderExamTable();
        }

            });
            unpaid.slice(0,20).forEach(s=>{
                html+=`<div class="flex justify-between text-sm border-b py-1"><span>${s.name} (${s.reg})</span>
                    <button class="text-blue-600 unpaid-wa" data-phone="${s.phone}" data-name="${s.name}">💬</button></div>`;
            });
            html+=`</div></div>`;
            panel.innerHTML = html;

            document.querySelectorAll('.unpaid-wa').forEach(b=>{
                b.addEventListener('click', function(){
                    const phone = this.dataset.phone;
                    const name = this.dataset.name;
                    const msg = `📢 പ്രിയപ്പെട്ട രക്ഷിതാവേ, ${name} ന്റെ ഫീസ് കുടിശ്ശികയുണ്ട്. ദയവായി അടക്കുക. - മമ്പഉൽ ഉലൂം മദ്റസ`;
                    window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`,'_blank');
                });
            });
        }

        // ----- PARENT PANEL -----
        function renderParentPanel() {
            const panel = document.getElementById('parentPanel');
            if(!currentUser.reg) {
                panel.innerHTML = `<div class="bg-white p-6 rounded-2xl shadow text-center">കുട്ടിയുടെ വിവരങ്ങൾ ലഭ്യമല്ല</div>`;
                return;
            }
            const student = allStudents.find(s=>s.reg===currentUser.reg);
            if(!student) {
                panel.innerHTML = `<div class="bg-white p-6 rounded-2xl shadow text-center">കുട്ടിയെ കണ്ടെത്തിയില്ല</div>`;
                return;
            }
            const totalFee = feeQR.monthlyFee || 200;
            let paidMonths = 0;
            for(let m=1;m<=12;m++){
                if(allFees[`${student.reg}_${m}`]) paidMonths++;
            }
            const balance = (12 - paidMonths) * totalFee;

            let html = `<div class="space-y-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm flex items-center gap-4">
                    <div class="w-16 h-16 bg-gray-200 rounded-full flex items-center justify-center text-3xl">👤</div>
                    <div><p class="font-bold text-lg">${student.name}</p>
                    <p class="text-sm">Reg: ${student.reg} | ക്ലാസ്സ്: ${student.cls} | ഷിഫ്റ്റ്: ${student.shift}</p>
                    <p class="text-sm">വാപ്പ: ${student.father} | ഫോൺ: ${student.phone}</p></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-4 rounded-2xl shadow-sm"><p class="text-sm text-gray-600">ആകെ ഫീസ് (വാർഷികം)</p><p class="text-xl font-bold">₹${totalFee*12}</p></div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm"><p class="text-sm text-gray-600">അടച്ചത്</p><p class="text-xl font-bold text-green-600">₹${paidMonths*totalFee}</p></div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm col-span-2"><p class="text-sm text-gray-600">ബാക്കി കുടിശ്ശിക</p><p class="text-xl font-bold text-red-600">₹${balance}</p></div>
                </div>
                ${feeQR.qrBase64 ? `<div class="bg-white p-4 rounded-2xl shadow-sm"><p class="font-bold">📱 QR കോഡ്</p><img src="${feeQR.qrBase64}" class="max-w-40 rounded-lg" /></div>` : ''}
                ${feeQR.googlePay ? `<div class="bg-white p-4 rounded-2xl shadow-sm"><p class="font-bold">Google Pay: ${feeQR.googlePay}</p></div>` : ''}
                <div class="bg-white p-4 rounded-2xl shadow-sm"><p class="font-bold">📢 അറിയിപ്പുകൾ</p>`;
            const parentAnn = allAnnouncements.filter(a=>a.target==='all' || a.target===student.shift);
            parentAnn.slice(-5).forEach(a=>{
                html+=`<div class="border-b py-1 text-sm"><b>${a.title}</b><br>${a.body}</div>`;
            });
            html+=`</div>
                <div class="bg-white p-4 rounded-2xl shadow-sm"><p class="font-bold">💬 അഭിപ്രായം / പരാതി</p>
                <textarea id="parentComplaint" class="w-full border rounded-lg p-2" placeholder="നിങ്ങളുടെ അഭിപ്രായം..."></textarea>
                <button id="sendParentComplaint" class="btn-primary px-4 py-2 rounded-xl text-sm font-bold mt-2">📤 അയക്കുക</button>
                </div>
            </div>`;
            panel.innerHTML = html;

            document.getElementById('sendParentComplaint')?.addEventListener('click', async function(){
                const text = document.getElementById('parentComplaint').value.trim();
                if(!text) return showToast('എന്തെങ്കിലും ടൈപ്പ് ചെയ്യുക','error');
                const complaint = { id:Date.now(), reg:student.reg, complaint:text, teacher:'', parent:'', date:new Date().toISOString() };
                complaints.push(complaint);
                await fbUpdate(`complaints/${complaint.id}`, complaint);
                showToast('✅ നിർദ്ദേശം അയച്ചു','success');
                // WhatsApp to teacher (if assigned)
                const teacher = allStaff.find(st=>st.classes && st.classes.includes(student.cls));
                if(teacher && teacher.phone) {
                    const msg = `📝 ${student.name} (${student.reg}) ന്റെ രക്ഷിതാവിൽ നിന്നുള്ള അഭിപ്രായം: ${text}`;
                    window.open(`https://wa.me/91${teacher.phone}?text=${encodeURIComponent(msg)}`,'_blank');
                }
            });
        }

        // ---------- LOGOUT ----------
        document.getElementById('logoutBtn')?.addEventListener('click', function(){
            if(confirm('പുറത്തുകടക്കണോ?')){
                currentUser = null;
                mainApp.classList.add('hidden');
                loginSection.classList.remove('hidden');
                renderLoginFields();
                showToast('👋 ലോഗൗട്ട് ചെയ്തു','info');
            }
        });

        // ---------- TAB SWITCHING ----------
        document.querySelectorAll('.tab-btn').forEach(btn=>{
            btn.addEventListener('click', function(){
                document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
                document.getElementById(this.dataset.tab).classList.add('active');
                document.querySelectorAll('.tab-btn').forEach(b=>{
                    b.className = b.className.replace('tab-active','').replace('tab-inactive','');
                    b.classList.add('tab-inactive');
                });
                this.classList.remove('tab-inactive');
                this.classList.add('tab-active');
                renderPanels();
            });
        });
        // set default tab styles
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.add('tab-inactive'));
        document.querySelector('.tab-btn[data-tab="sadharPanel"]').classList.remove('tab-inactive');
        document.querySelector('.tab-btn[data-tab="sadharPanel"]').classList.add('tab-active');

        // ---------- INIT ----------
        loginTypeSelect.addEventListener('change', renderLoginFields);
        loginBtn.addEventListener('click', handleLogin);
        // Enter key support
        document.addEventListener('keydown', (e)=> { if(e.key==='Enter') handleLogin(); });

        // Load data and init
        async function init() {
            await loadAllData();
            renderLoginFields();
            loader.classList.add('hidden');
            // Auto-login check? No, show login.
        }
        init();

        // Refresh protection: restore if user already logged? Actually we need to keep session via currentUser variable.
        // Since we don't store in localStorage intentionally, we rely on variable.
        // But we could store session in sessionStorage to survive refresh?
        // As per spec: "Refresh Protection: അബദ്ധത്തിൽ റീഫ്രഷ് ആയാലോ ക്ലോസ് ആയാലോ ലോഗ്ഔട്ട് ആകില്ല"
        // We'll store in sessionStorage.
        window.addEventListener('beforeunload', function(){
            if(currentUser) {
                sessionStorage.setItem('madrasa_user', JSON.stringify(currentUser));
            }
        });
        // restore on load
        const saved = sessionStorage.getItem('madrasa_user');
        if(saved) {
            try {
                const u = JSON.parse(saved);
                if(u && u.role) {
                    currentUser = u;
                    // re-enter app after data load
                    setTimeout(()=>{
                        if(currentUser) {
                            loginSection.classList.add('hidden');
                            mainApp.classList.remove('hidden');
                            userRoleBadge.textContent = currentUser.role === 'sadhar' ? '👑 സദർ' :
                                                        currentUser.role === 'teacher' ? '🧑‍🏫 അധ്യാപകൻ' :
                                                        currentUser.role === 'management' ? '📊 മാനേജ്മെന്റ്' :
                                                        '👪 രക്ഷിതാവ്';
                            renderPanels();
                        }
                    }, 500);
                }
            } catch(e){}
        }

        // on logout, clear session
        const origLogout = document.getElementById('logoutBtn')?.click;
        document.getElementById('logoutBtn')?.addEventListener('click', function(){
            sessionStorage.removeItem('madrasa_user');
        });

        // Also check for deleted staff on each panel render
        // Already handled in login

        console.log('✅ മമ്പഉൽ ഉലൂം മദ്റസ ആപ്പ് ലോഡ് ചെയ്തു');
    })();
</script>
</body>
</html>
