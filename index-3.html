<title>മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്</title>
<style>
:root{
  --ink:#1f2a24;
  --paper:#f6f3ec;
  --moss:#3c5a45;
  --moss-deep:#2a4032;
  --gold:#c8943f;
  --gold-soft:#e8d3a8;
  --rose:#a8483a;
  --line:#d8d2c2;
  --card:#ffffff;
  --muted:#7a8077;
  --radius:14px;
  --shadow:0 2px 10px rgba(31,42,36,0.07);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Noto Sans Malayalam','Noto Sans',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Noto Serif Malayalam','Noto Serif',serif; margin:0;}
img{max-width:100%; display:block;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit; font-size:16px;}

/* ===== Top bar ===== */
.topbar{
  background:var(--moss-deep);
  color:#fff;
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky; top:0; z-index:50;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
.topbar .brand{display:flex; align-items:center; gap:10px;}
.topbar .brand .icon{
  width:36px; height:36px; border-radius:10px;
  background:var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:700; color:var(--moss-deep);
  flex-shrink:0;
}
.topbar .brand-text{line-height:1.2;}
.topbar .brand-text .title{font-family:'Noto Serif Malayalam',serif; font-size:15px; font-weight:700;}
.topbar .brand-text .sub{font-size:11px; opacity:.7;}
.logout-btn{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.25);
  color:#fff;
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
}
.logout-btn:active{background:rgba(255,255,255,0.25);}

.topbar-actions{display:flex; align-items:center; gap:8px;}
.sync-btn{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.25);
  color:#fff;
  width:34px; height:34px;
  border-radius:999px;
  font-size:15px;
  display:flex; align-items:center; justify-content:center;
}
.sync-btn:active{background:rgba(255,255,255,0.25);}
.sync-btn.spinning{animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

#sync-overlay{
  position:fixed; inset:0; background:rgba(15,40,40,.92);
  z-index:9999; display:flex; align-items:center; justify-content:center;
  color:#fff; text-align:center; flex-direction:column; gap:12px;
  font-size:14px;
}
#sync-overlay .spin{font-size:34px; animation:spin 1s linear infinite;}

/* ===== Layout ===== */
.app-container{max-width:560px; margin:0 auto; padding:16px; padding-bottom:90px;}
.screen{display:none;}
.screen.active{display:block;}

/* ===== Login ===== */
.login-wrap{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:24px;
}
.login-card{
  background:var(--card);
  border-radius:20px;
  box-shadow:var(--shadow);
  padding:32px 24px;
  width:100%; max-width:380px;
  text-align:center;
}
.login-emblem{
  width:64px; height:64px; border-radius:18px;
  background:linear-gradient(135deg, var(--moss), var(--moss-deep));
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 16px;
  font-size:28px; color:var(--gold-soft); font-weight:700;
}
.login-card h1{font-size:20px; color:var(--moss-deep); margin-bottom:4px;}
.login-card .reg-line{font-size:12px; color:var(--muted); margin-bottom:24px;}
.field{margin-bottom:14px; text-align:left;}

const DB = {
  data: null,
  _firebaseApp: null,

  // Apply all migrations to any data object (local or cloud-downloaded)
  applyMigrations(d){
    if(!d) return d;
    if(!d.holidayLog) d.holidayLog = [];
    if(!d.holidays || Array.isArray(d.holidays)) d.holidays = {};
    if(!d.fees) d.fees = { monthly:100, annual:1000, qrCode:null, gpayNumber:"" };
    if(d.fees.qrCode === undefined) d.fees.qrCode = null;
    if(d.fees.gpayNumber === undefined) d.fees.gpayNumber = "";
    if(d._updatedAt === undefined) d._updatedAt = 0;
    if(!d.auth) d.auth = {};
    // Firebase converts arrays to objects — convert back to arrays
    const toArr = v => {
      if(!v) return [];
      if(Array.isArray(v)) return v;
      if(typeof v === 'object') return Object.values(v);
      return [];
    };
    d.auth.staff = toArr(d.auth.staff);
    d.auth.staff.forEach(st=>{
      if(!Array.isArray(st.classes)) st.classes = toArr(st.classes);
      if(st.photo === undefined || st.photo === null) st.photo = "";
      if(st.phone === undefined || st.phone === null) st.phone = "";
    });
    if(!d.auth.sadhar) d.auth.sadhar = { username:"sadhar", password:"6682" };
    d.students = (!d.students) ? buildDefaultData().students : toArr(d.students);
    // Firebase strips empty arrays/objects (e.g. payments:[] or marks:{}) entirely —
    // restore them on every student record so .length / property access never crashes.
    d.students.forEach(s=>{
      if(!Array.isArray(s.payments)) s.payments = toArr(s.payments);
      if(!s.marks || typeof s.marks !== 'object' || Array.isArray(s.marks)) s.marks = s.marks || {};
      if(s.paidTotal === undefined || s.paidTotal === null) s.paidTotal = 0;
      if(s.photo === undefined || s.photo === null) s.photo = "";
      if(s.phone === undefined || s.phone === null) s.phone = "";

    });
    if(!d.attendance || Array.isArray(d.attendance)) d.attendance = {};
    if(!d.shifts) d.shifts = {};
    // Firebase stores numeric keys as strings — normalize and ensure all 3 shifts exist
    [1,2,3].forEach(sk=>{

      if(!shift || typeof shift !== 'object'){
        d.shifts[sk] = { time: `ഷിഫ്റ്റ് ${sk}`, classes: [] };
      } else {

        if(!d.shifts[sk].time) d.shifts[sk].time = `ഷിഫ്റ്റ് ${sk}`;
        if(!Array.isArray(d.shifts[sk].classes)) d.shifts[sk].classes = toArr(d.shifts[sk].classes);
      }
    });
    if(!d.shifts[1].classes.length && !d.shifts[2].classes.length && !d.shifts[3].classes.length){
      initShiftClasses(d);
    }
    if(!d.announcements) d.announcements = [];
    else d.announcements = toArr(d.announcements);
    if(!d.complaints) d.complaints = { toSadhar:[], toTeacher:[] };

    if(!d.reviews) d.reviews = [];

    return d;
  },

  load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        this.data = JSON.parse(raw);
        this.applyMigrations(this.data);
      } else {

        initShiftClasses(this.data);
        this.data._updatedAt = Date.now();
        this.save();
      }
    }catch(e){
      console.error("DB load error", e);
      this.data = buildDefaultData();
      initShiftClasses(this.data);
      this.data._updatedAt = Date.now();
      this.save();
    }
    return this.data;
  },

  save(){
    try{
      this.data._updatedAt = Date.now();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data));
    }catch(e){
      console.error("DB save error", e);
    }
    this.pushToCloud();
  },

  reset(){
    this.data = buildDefaultData();
    initShiftClasses(this.data);
    this.data._updatedAt = Date.now();
    this.save();
  },

  // =====================================================================
  // Cloud sync (Firebase Realtime Database via plain REST API).
  // We deliberately avoid the Firebase JS SDK's WebSocket connection
  // (firebase.database()) because some mobile carriers / networks block
  // or silently drop that persistent socket, which made sync hang
  // forever on certain phones. Plain HTTPS REST calls work everywhere
  // a normal web page works.
  // =====================================================================

  cloudConfigured(){
    return !!(FIREBASE_CONFIG && FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.databaseURL.indexOf("YOUR_PROJECT") === -1);
  },

  cloudUrl(suffix){
    // suffix like "" or "/auth"
    const base = FIREBASE_CONFIG.databaseURL.replace(/\/$/, "");
    const tokenParam = CLOUD_AUTH_TOKEN ? `?auth=${encodeURIComponent(CLOUD_AUTH_TOKEN)}` : "";
    return `${base}/${CLOUD_SYNC_PATH}${suffix || ""}.json${tokenParam}`;
  },

  // Returns a copy of data with only the truly heavy/non-essential media
  // (announcement videos, the fee QR image) stripped out, so the payload
  // stays a reasonable size. Student/staff/sadhar photos are KEPT — they
  // are compressed client-side at upload time (see U.readPhotoFile) so
  // they stay small, and they need to sync across devices/roles (e.g. a
  // teacher's photo must be visible to parents and other teachers, and a
  // student's photo must be visible to other teachers and committee members).
  dataForCloud(){
    const d = JSON.parse(JSON.stringify(this.data));
    if(d.fees && d.fees.qrCode && d.fees.qrCode.length > 300000) d.fees.qrCode = null; // only drop if unusually large
    if(d.announcements) d.announcements.forEach(a=>{ if(a.mediaData) delete a.mediaData; });
    return d;
  },

  // PUT (overwrite) the whole node via REST.
  cloudPut(data){
    if(!this.cloudConfigured()) return Promise.resolve(false);
    return fetch(this.cloudUrl(), {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    }).then(r=>{
      if(!r.ok) throw new Error("HTTP " + r.status);
      return true;
    }).catch(e=>{
      console.error("Cloud PUT error", e);
      return false;
    });
  },

  // GET the whole node via REST.
  cloudGet(){
    if(!this.cloudConfigured()) return Promise.resolve(null);
    return fetch(this.cloudUrl(), { method: "GET" })
      .then(r=>{
        if(!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .catch(e=>{
        console.error("Cloud GET error", e);
        return undefined; // undefined = fetch failed; null = legitimately empty
      });
  },

  pushToCloud(){
    if(!this.cloudConfigured()) return;
    this.cloudPut(this.dataForCloud());
  },

  // One-time fetch + merge, used on app start. Always calls done(),
  // even if cloud is unreachable (with a short timeout fallback).
  // Merge two arrays of records (e.g. students, staff) by a key field.
  // Keeps every record that exists in EITHER side (so a record added on
  // one phone is never silently deleted by a sync from another phone),
  // and when a record exists on both sides, prefers whichever copy is
  // "more complete" (more populated fields) as a simple heuristic since
  // individual records don't carry their own timestamp.
  mergeArraysByKey(localArr, cloudArr, keyField){
    localArr = Array.isArray(localArr) ? localArr : [];
    cloudArr = Array.isArray(cloudArr) ? cloudArr : [];
    const byKey = new Map();
    const score = (rec) => Object.values(rec || {}).filter(v => v !== "" && v !== null && v !== undefined && !(Array.isArray(v) && v.length===0)).length;

    cloudArr.forEach(rec=>{ if(rec && rec[keyField] !== undefined) byKey.set(rec[keyField], rec); });
    localArr.forEach(rec=>{
      if(!rec || rec[keyField] === undefined) return;
      const existing = byKey.get(rec[keyField]);
      if(!existing){
        byKey.set(rec[keyField], rec); // only on local — keep it
      } else {
        // exists on both — keep the more complete one
        byKey.set(rec[keyField], score(rec) >= score(existing) ? rec : existing);
      }
    });
    return Array.from(byKey.values());
  },

  // Merge cloud data into local data field-by-field instead of a blind
  // wholesale overwrite, so concurrent edits on two phones don't erase
  // each other's additions (e.g. a newly-added teacher disappearing).
  mergeCloudIntoLocal(cloud){
    const local = this.data;
    const merged = JSON.parse(JSON.stringify(local));

    merged.auth = merged.auth || {};
    merged.auth.staff = this.mergeArraysByKey(local.auth && local.auth.staff, cloud.auth && cloud.auth.staff, 'id');
    // sadhar credentials: prefer whichever side was updated more recently overall
    merged.auth.sadhar = ((cloud._updatedAt||0) > (local._updatedAt||0)) ? (cloud.auth && cloud.auth.sadhar) || merged.auth.sadhar : merged.auth.sadhar;

    merged.students = this.mergeArraysByKey(local.students, cloud.students, 'id');
    merged.announcements = this.mergeArraysByKey(local.announcements, cloud.announcements, 'id');
    merged.reviews = this.mergeArraysByKey(local.reviews, cloud.reviews, 'id');
    if(cloud.complaints){
      merged.complaints = merged.complaints || { toSadhar:[], toTeacher:[] };
      merged.complaints.toSadhar = this.mergeArraysByKey(local.complaints && local.complaints.toSadhar, cloud.complaints.toSadhar, 'id');
      merged.complaints.toTeacher = this.mergeArraysByKey(local.complaints && local.complaints.toTeacher, cloud.complaints.toTeacher, 'id');
    }

    // Attendance/fees/results/timetables/holidays: merge by simply taking
    // whichever side has the field, preferring the more recently-updated
    // side's value when both have it (these are rarely edited concurrently
    // by two different people on the same key).
    const preferNewer = ((cloud._updatedAt||0) > (local._updatedAt||0));
    ['attendance','fees','results','timetables','holidays','holidayLog','meta','shifts'].forEach(key=>{
      if(cloud[key] === undefined) return;
      if(local[key] === undefined){ merged[key] = cloud[key]; return; }
      merged[key] = preferNewer ? cloud[key] : merged[key];
    });

    merged._updatedAt = Math.max(cloud._updatedAt||0, local._updatedAt||0, Date.now());
    return merged;
  },

  initCloudSync(done){
    if(!this.cloudConfigured()){ done(); return; }
    let finished = false;
    const finish = ()=>{ if(finished) return; finished = true; done(); };
    const timer = setTimeout(finish, 10000);

    this.cloudGet().then(cloud=>{
      clearTimeout(timer);

      if(cloud === undefined){
        // Network/fetch failure — keep working with local data, try push in background
        this.cloudPut(this.dataForCloud());
        finish();
        return;
      }

      if(cloud && typeof cloud === 'object'){
        this.applyMigrations(cloud);

        const cloudShiftsOk = cloud.shifts && cloud.shifts[1] && Array.isArray(cloud.shifts[1].classes);
        const localShiftsOk = this.data.shifts && this.data.shifts[1] && Array.isArray(this.data.shifts[1].classes);
        if(!cloudShiftsOk && localShiftsOk){
          cloud.shifts = this.data.shifts;
        }

        // Merge instead of overwrite, so concurrent additions on different
        // phones (e.g. two staff added around the same time) are never lost.
        this.data = this.mergeCloudIntoLocal(cloud);
        this.applyMigrations(this.data);

        try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); }catch(e){}
        this.cloudPut(this.dataForCloud());
      } else {
        // Cloud empty -> seed it with local data
        this.cloudPut(this.dataForCloud());
      }
      finish();
    });
  },

  // Manual re-sync (pull latest from cloud if newer, then refresh UI).
  // callback(updated:boolean, error?)
  syncFromCloud(callback){
    if(!this.cloudConfigured()){ if(callback) callback(false, "not-configured"); return; }
    this.cloudGet().then(cloud=>{
      if(cloud === undefined){
        if(callback) callback(false, "fetch-failed");
        return;
      }
      if(cloud && typeof cloud === 'object'){
        this.applyMigrations(cloud);

        const cloudShiftsOk = cloud.shifts && cloud.shifts[1] && Array.isArray(cloud.shifts[1].classes);
        const localShiftsOk = this.data.shifts && this.data.shifts[1] && Array.isArray(this.data.shifts[1].classes);
        if(!cloudShiftsOk && localShiftsOk){
          cloud.shifts = this.data.shifts;
        }

        this.data = this.mergeCloudIntoLocal(cloud);
        this.applyMigrations(this.data);
        try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); }catch(e){}
        this.cloudPut(this.dataForCloud());
        if(callback) callback(true);
        return;
      } else {
        this.cloudPut(this.dataForCloud());
      }
      if(callback) callback(false);
    });
  }
};

  accordionItem(id, num, title, bodyHtml){
    return `
      <div class="accordion-item" id="${id}">

          <div class="accordion-head-left"><span class="num">${num}</span><span>${title}</span></div>

  toggleClassShift(checkbox){
    const data = DB.data;
    const shift = checkbox.dataset.shift;
    const cls = checkbox.dataset.class;
    // remove this class from all shifts first
    for(const sk of [1,2,3]){
      const idx = data.shifts[sk].classes.indexOf(cls);
      if(idx > -1) data.shifts[sk].classes.splice(idx,1);
    }
    if(checkbox.checked){
      data.shifts[shift].classes.push(cls);
    }
    DB.save();
    App.refresh();
    U.toast(`${CLASS_LABELS[cls]} ഷിഫ്റ്റ് ${shift}-ലേക്ക് മാറ്റി`);
    // keep accordion open
    setTimeout(()=>{
      const el = document.getElementById("acc-shift");
      if(el){
        el.classList.add("open");
        el.querySelector(".accordion-body").style.maxHeight = el.querySelector(".accordion-body").scrollHeight + "px";
      }
    }, 50);
  },

  saveShiftTimes(){
    for(const sk of [1,2,3]){
      const val = document.getElementById(`shift-time-${sk}`).value.trim();
      DB.data.shifts[sk].time = val;
    }
    DB.save();
    U.toast("ഷിഫ്റ്റ് സമയം സേവ് ചെയ്തു");
  },

  saveFees(){
    const monthly = parseFloat(document.getElementById("fee-monthly").value) || 0;
    const annual = parseFloat(document.getElementById("fee-annual").value) || 0;
    DB.data.fees.monthly = monthly;
    DB.data.fees.annual = annual;
    DB.data.fees.gpayNumber = document.getElementById("fee-gpay").value.trim();
    const qrInput = document.getElementById("fee-qr-upload");
    const finish = ()=>{
      DB.save();

      App.refresh();
      setTimeout(()=> U.toggleAccordion("acc-fees"), 50);
      setTimeout(()=> U.toggleAccordion("acc-fees"), 60);
    };
    if(qrInput && qrInput.files[0]){
      U.readImageFile(qrInput.files[0], (data64)=>{ DB.data.fees.qrCode = data64; finish(); });

  saveProfile(){
    const username = document.getElementById("sadhar-username").value.trim();
    const password = document.getElementById("sadhar-password").value.trim();
    if(!username || !password){
      U.toast("യൂസർനെയിമും പാസ്‌വേർഡും നൽകുക");
      return;
    }
    DB.data.auth.sadhar.username = username;
    DB.data.auth.sadhar.password = password;
    DB.data.auth.sadhar.name = document.getElementById("sadhar-name").value.trim();
    DB.data.auth.sadhar.phone = document.getElementById("sadhar-phone").value.trim();
    const fileInput = document.getElementById("sadhar-photo");
    const finish = ()=>{
      DB.save();
      U.toast("പ്രൊഫൈൽ സേവ് ചെയ്തു");
      App.refresh();
    };
    if(fileInput.files[0]){
      U.readPhotoFile(fileInput.files[0], (data64)=>{ DB.data.auth.sadhar.photo = data64; finish(); });

  downloadBackup(){
    const dataStr = JSON.stringify(DB.data, null, 2);
    const blob = new Blob([dataStr], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `madrasa_6682_backup_${U.todayStr()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    U.toast("ബാക്കപ്പ് ഡൗൺലോഡ് ആയി");
  },

  restoreBackup(){
    const fileInput = document.getElementById("restore-file");
    const file = fileInput.files[0];
    if(!file){
      U.toast("ഫയൽ സെലക്ട് ചെയ്യുക");
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      try{
        const parsed = JSON.parse(e.target.result);
        DB.data = parsed;
        DB.save();
        U.toast("ഡാറ്റ റീസ്റ്റോർ ചെയ്തു!");
        App.refresh();
      }catch(err){
        U.toast("ഫയൽ വായിക്കാൻ കഴിഞ്ഞില്ല");
      }
    };
    reader.readAsText(file);
  },

  holidayContent(){
    const data = DB.data;
    const targets = [
      {key:"all", label:"എല്ലാ ഷിഫ്റ്റും (All Shifts)"},
      {key:"1", label:"ഷിഫ്റ്റ് 1"},

    </div>

      <label>കാരണം (Reason)</label>

    </div>
    <button class="primary-btn" onclick="Sadhar.setHoliday()">അവധി പ്രഖ്യാപിക്കുക</button>
    <div class="divider"></div>
    <div class="card-title" style="font-size:13px;">നിലവിലുള്ള അവധികൾ</div>`;

    let any = false;
    targets.forEach(t => {
      const h = data.holidays[t.key];
      if(h && h.active){
        any = true;
        html += `<div class="row">
          <span>${t.label}: <strong>${U.esc(h.reason)}</strong></span>
          <button class="btn-del" onclick="Sadhar.clearHoliday('${t.key}')">റദ്ദാക്കുക</button>

      }
    });
    if(!any){
      html += `<p class="muted">നിലവിൽ അവധികൾ ഇല്ല.</p>`;
    }

    html += `<div class="divider"></div>
    <div class="card-title" style="font-size:13px;">ഹാജർ ചരിത്രം (Attendance History)</div>
    <div class="form-group">
      <label>തീയതി തിരഞ്ഞെടുക്കുക</label>
      <input type="date" id="att-history-date" min="2026-06-01" max="2027-03-31" onchange="Sadhar.showAttendanceHistory()">
    </div>
    <div id="att-history-result"></div>`;

    return html;

  setHoliday(){
    const target = document.getElementById("holiday-target").value;
    const reason = document.getElementById("holiday-reason").value.trim();
    if(!reason){
      U.toast("കാരണം നൽകുക");
      return;
    }
    DB.data.holidays[target] = { active:true, reason, date: U.todayStr() };
    if(!DB.data.holidayLog) DB.data.holidayLog = [];
    DB.data.holidayLog.push({ date: U.todayStr(), target, reason });

    // Clear today's attendance for affected shift(s) so teachers can re-take it after holiday ends
    const today = U.todayStr();
    if(DB.data.attendance[today]){
      const affectedShifts = (target === "all") ? [1,2,3] : [parseInt(target)];
      DB.data.students.forEach(s=>{
        const sh = U.classShift(s.cls);
        if(affectedShifts.includes(sh)){
          delete DB.data.attendance[today][s.id];
        }
      });
      DB.data.auth.staff.forEach(st=>{
        if(st.role !== 'teacher') return;
        const teacherShifts = (st.classes || []).map(c=>U.classShift(c)).filter(Boolean);
        if(teacherShifts.some(sh=>affectedShifts.includes(sh))){
          delete DB.data.attendance[today][st.id];
        }
      });
    }

    DB.save();
    U.toast("അവധി പ്രഖ്യാപിച്ചു. ഇന്നത്തെ ഹാജർ ക്ലിയർ ചെയ്തു.");
    App.refresh();
    setTimeout(()=> U.toggleAccordion("acc-holiday"), 50);
    setTimeout(()=> U.toggleAccordion("acc-holiday"), 60);
  },

  clearHoliday(key){
    delete DB.data.holidays[key];
    DB.save();
    U.toast("അവധി റദ്ദാക്കി");
    App.refresh();
    setTimeout(()=> U.toggleAccordion("acc-holiday"), 50);
    setTimeout(()=> U.toggleAccordion("acc-holiday"), 60);
  },

  showAttendanceHistory(){
    const date = document.getElementById("att-history-date").value;
    const resBox = document.getElementById("att-history-result");
    if(!date){ resBox.innerHTML = ""; return; }
    const att = DB.data.attendance[date];
    if(!att){
      resBox.innerHTML = `<p class="muted" style="margin-top:8px;">ഈ തീയതിക്ക് ഹാജർ രേഖപ്പെടുത്തിയിട്ടില്ല.</p>`;
      return;
    }
    let present=0, absent=0;

      else if(att[s.id]==='absent') absent++;

    resBox.innerHTML = `<div class="row" style="margin-top:8px;">
      <span class="pill green">ഹാജർ: ${present}</span>
      <span class="pill red">അസാന്നിധ്യം: ${absent}</span>

  // ---------- Announcements ----------
  renderAnnounce(){
    let html = `<h2 style="margin-bottom:14px;">പൊതു അറിയിപ്പുകൾ (Announcements)</h2>`;
    html += `<div class="card">
      <div class="form-group"><label>അറിയിപ്പ് / സന്ദേശം (ടൈപ്പ് ചെയ്യുക)</label>
        <textarea id="ann-text" placeholder="ഇവിടെ ടൈപ്പ് ചെയ്യുക..."></textarea>
      </div>
      <div class="form-group">
        <label>📎 ഫോട്ടോ / ഓഡിയോ / വീഡിയോ (ഐച്ഛികം)</label>
        <input type="file" id="ann-media" accept="image/*,audio/*,video/*">
        <div class="muted" style="margin-top:4px; font-size:12px;">⚠️ ഫോട്ടോ/ഓഡിയോ/വീഡിയോ ആപ്പിൽ കാണിക്കും. WhatsApp-ൽ text message ആദ്യം send ചെയ്ത ശേഷം media manually share ചെയ്യാം.</div>
      </div>
      <div class="form-group"><label>ലക്ഷ്യം (Target)</label>
        <select id="ann-target">
          <option value="all">എല്ലാ കുട്ടികളും (All Students)</option>
          <option value="1">ഷിഫ്റ്റ് 1</option>
          <option value="2">ഷിഫ്റ്റ് 2</option>
          <option value="3">ഷിഫ്റ്റ് 3</option>
        </select>
      </div>
      <button class="primary-btn" onclick="Sadhar.publishAnnouncement()">പ്രസിദ്ധീകരിക്കുക</button>
    </div>`;

    html += `<div class="section-title">പ്രസിദ്ധീകരിച്ച അറിയിപ്പുകൾ</div>`;
    const anns = DB.data.announcements.slice().reverse();
    anns.forEach(a => {
      let targetLabel = a.target === "all" ? "എല്ലാവരും" : `ഷിഫ്റ്റ് ${a.target}`;
      let mediaHtml = "";
      if(a.mediaType && a.mediaData){
        if(a.mediaType.startsWith("image/")){
          mediaHtml = `<img src="${a.mediaData}" style="max-width:100%;border-radius:8px;margin-bottom:8px;">`;
        } else if(a.mediaType.startsWith("audio/")){
          mediaHtml = `<audio controls style="width:100%;margin-bottom:8px;"><source src="${a.mediaData}" type="${a.mediaType}"></audio>`;
        } else if(a.mediaType.startsWith("video/")){
          mediaHtml = `<video controls style="max-width:100%;border-radius:8px;margin-bottom:8px;"><source src="${a.mediaData}" type="${a.mediaType}"></video>`;
        }
      }
      html += `<div class="card">
        <div class="row"><span class="pill">${targetLabel}</span><span class="muted">${a.date}</span></div>
        <p style="margin:8px 0 10px;">${U.esc(a.text)}</p>
        ${mediaHtml}
        <button class="btn-wa" onclick="Sadhar.sendBroadcast('${a.id}')">📩 WhatsApp അയക്കാൻ ലിസ്റ്റ് കാണുക</button>
        <div id="bc-list-${a.id}"></div>
        <div style="margin-top:8px;"><button class="btn-del" onclick="Sadhar.deleteAnnouncement('${a.id}')">നീക്കം ചെയ്യുക</button></div>
      </div>`;
    });
    if(anns.length===0){
      html += `<div class="empty-state"><div class="emoji">📢</div>ഇതുവരെ അറിയിപ്പുകൾ ഇല്ല</div>`;
    }
    return html;
  },

  publishAnnouncement(){
    const text = document.getElementById("ann-text").value.trim();
    const target = document.getElementById("ann-target").value;
    if(!text){ U.toast("അറിയിപ്പ് ടൈപ്പ് ചെയ്യുക"); return; }
    const mediaInput = document.getElementById("ann-media");
    const file = mediaInput && mediaInput.files[0];
    const doSave = (mediaData, mediaType) => {
      const ann = { id: U.uid("ANN"), text, target, date: U.todayDisplay() };
      if(mediaData){ ann.mediaData = mediaData; ann.mediaType = mediaType; }
      DB.data.announcements.push(ann);
      DB.save();
      U.toast("അറിയിപ്പ് പ്രസിദ്ധീകരിച്ചു");
      App.refresh();
    };
    if(file){
      U.readImageFile(file, (data64) => doSave(data64, file.type));
    } else {
      doSave(null, null);
    }
  },

  deleteAnnouncement(id){
    const idx = DB.data.announcements.findIndex(a=>a.id===id);
    if(idx>-1) DB.data.announcements.splice(idx,1);
    DB.save();
    App.refresh();
  },

  sendBroadcast(id){
    const ann = DB.data.announcements.find(a=>a.id===id);
    if(!ann) return;
    let students = [];
    if(ann.target === "all"){
      students = DB.data.students;
    } else {
      const shiftClasses = DB.data.shifts[ann.target].classes;
      students = DB.data.students.filter(s=>shiftClasses.includes(s.cls));
    }
    const box = document.getElementById("bc-list-"+id);
    if(box.innerHTML !== ""){ box.innerHTML=""; return; }
    let html = `<div class="divider"></div>`;
    students.forEach(s=>{
      const msg = `അറിയിപ്പ് - മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്:\n${ann.text}\n\n(${s.name}, ${CLASS_LABELS[s.cls]})`;
      html += `<div class="row" style="margin-bottom:6px;">
        <span style="font-size:13px;">${U.esc(s.name)} (${s.reg})</span>
        <button class="btn-wa" onclick='U.sendWhatsApp("${s.phone}", ${JSON.stringify(msg)})'>📩</button>
      </div>`;
    });
    if(students.length===0) html += `<p class="muted">ആരും കണ്ടെത്തിയില്ല</p>`;
    box.innerHTML = html;
  },

  // ---------- Complaints view ----------
  renderComplaints(){
    let html = `<h2 style="margin-bottom:14px;">രക്ഷിതാക്കളുടെ പരാതികൾ (Complaints)</h2>`;
    const list = DB.data.complaints.toSadhar.slice().reverse();
    list.forEach(c=>{
      const student = U.studentByReg(c.studentReg);
      html += `<div class="card">
        <div class="row"><span class="card-title" style="margin-bottom:0;">${student?U.esc(student.name):'അജ്ഞാതൻ'} (${c.studentReg})</span><span class="muted">${c.date}</span></div>
        <p style="margin-top:8px;">${U.esc(c.text)}</p>
      </div>`;
    });
    if(list.length===0){
      html += `<div class="empty-state"><div class="emoji">💬</div>ഇതുവരെ പരാതികൾ ലഭിച്ചിട്ടില്ല</div>`;
    }
    return html;
  }
};

    const myClasses = this.myClasses();

    }).slice().reverse().slice(0,10);

      html += `<div class="section-title">അടുത്തിടെ അയച്ച റിവ്യൂകൾ</div>`;

        html += `<div class="card">

          <button class="btn-del" onclick="Teacher.deleteReview('${r.id}')">ഡിലീറ്റ് ചെയ്യുക</button>
        </div>`;
      });
    }

    return html;
  },

  deleteReview(id){
    const idx = DB.data.reviews.findIndex(r=>r.id===id);
    if(idx>-1) DB.data.reviews.splice(idx,1);
    DB.save();
    U.toast("നീക്കം ചെയ്തു");
    App.refresh();
  },

  lookupReviewStudent(){
    const reg = document.getElementById("rev-reg").value.trim();
    const infoBox = document.getElementById("rev-student-info");
    if(!reg){ infoBox.innerHTML=""; return; }
    const s = U.studentByReg(reg);
    if(!s){
      infoBox.innerHTML = `<p class="muted" style="margin-top:8px;">കുട്ടിയെ കണ്ടെത്താനായില്ല</p>`;
      return;
    }
    infoBox.innerHTML = `
      <div class="divider"></div>
      <div class="row">
        ${U.photoOrInitial(s.photo, s.name)}
        <div style="flex:1; margin-left:10px;">
          <div class="card-title" style="margin-bottom:2px;">${U.esc(s.name)}</div>
          <div class="muted">${CLASS_LABELS[s.cls]} • Reg No: ${s.reg}</div>
        </div>
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label>നിർദ്ദേശം / അഭിപ്രായം (ടൈപ്പ് ചെയ്യുക)</label>
        <textarea id="rev-text" placeholder="ഇവിടെ ടൈപ്പ് ചെയ്യുക..."></textarea>
      </div>
      <button class="primary-btn btn-block" onclick="Teacher.sendReview('${s.id}')">📩 രക്ഷിതാവിന് അയക്കുക</button>
    `;
  },

  sendReview(studentId){
    const text = document.getElementById("rev-text").value.trim();
    if(!text){ U.toast("നിർദ്ദേശം ടൈപ്പ് ചെയ്യുക"); return; }
    const s = U.studentById(studentId);
    const teacherName = App.user.name || "അധ്യാപകൻ";
    const msg = `പ്രിയ രക്ഷിതാവേ, ${s.name} (${CLASS_LABELS[s.cls]}, Reg No: ${s.reg}) സംബന്ധിച്ച് ${teacherName}-ന്റെ നിർദ്ദേശം:\n\n"${text}"\n\n- മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്.`;

    const review = { id: U.uid("REV"), studentReg: s.reg, text, date: U.todayDisplay(), from: teacherName };
    DB.data.reviews.push(review);
    DB.save();

    U.sendWhatsApp(s.phone, msg);
    U.toast("നിർദ്ദേശം അയച്ചു");
    const ti = document.getElementById("rev-text");
    if(ti) ti.value = "";
  },

  renderMore(){
    let html = `<h2 style="margin-bottom:14px;">കൂടുതൽ (More)</h2>`;

    // Results entry
    html += `<div class="card">
      <div class="card-title">പരീക്ഷാ മാർക്ക് രേഖപ്പെടുത്തൽ (Enter Results)</div>
      <div class="form-group">
        <label>ക്ലാസ്സ്</label>
        <select id="res-class" onchange="Teacher.loadResultEntry()">

      </div>
      <div class="form-group">
        <label>വിഷയങ്ങൾ (കോമ കൊണ്ട് വേർതിരിക്കുക)</label>

        <label>ക്ലാസ്സ്</label>
        <select id="tv-class" onchange="Teacher.viewTimetable()">

  loadResultEntry(){
    const cls = document.getElementById("res-class").value;
    const exam = document.getElementById("res-exam").value.trim();
    const subjectsStr = document.getElementById("res-subjects").value.trim();
    const area = document.getElementById("res-entry-area");
    if(!exam || !subjectsStr){ area.innerHTML=""; return; }
    const subjects = subjectsStr.split(",").map(s=>s.trim()).filter(Boolean);
    const students = U.studentsByClass(cls);

    const existing = (DB.data.results[exam] && DB.data.results[exam][cls]) || {};

    let html = `<div class="divider"></div>`;
    students.forEach(s=>{
      const marks = existing[s.reg] ? existing[s.reg].subjects : {};
      html += `<div style="margin-bottom:10px;">
        <div style="font-weight:700; font-size:13px; margin-bottom:6px;">${U.esc(s.name)} (${s.reg})</div>
        <div class="chip-grid">
          ${subjects.map(sub=>`<div style="display:flex; flex-direction:column; gap:3px;">
            <label class="muted" style="font-size:11px;">${U.esc(sub)}</label>
            <input type="number" style="width:70px; padding:6px;" id="mark-${s.reg}-${sub.replace(/\s/g,'_')}" value="${marks[sub]!==undefined?marks[sub]:''}">
          </div>`).join("")}
        </div>
      </div>`;
    });
    html += `<button class="primary-btn" onclick="Teacher.saveResults('${cls}', ${JSON.stringify(exam)}, ${JSON.stringify(subjects)})">മാർക്ക് സേവ് ചെയ്ത് റാങ്ക് കണക്കാക്കുക</button>`;
    area.innerHTML = html;
  },

  saveResults(cls, exam, subjects){
    const students = U.studentsByClass(cls);
    if(!DB.data.results[exam]) DB.data.results[exam] = {};
    const classResults = {};

    students.forEach(s=>{
      const subjMarks = {};
      let total = 0;
      subjects.forEach(sub=>{
        const val = parseFloat(document.getElementById(`mark-${s.reg}-${sub.replace(/\s/g,'_')}`).value) || 0;
        subjMarks[sub] = val;
        total += val;
      });
      classResults[s.reg] = { subjects: subjMarks, total };
    });

    // compute ranks
    const sorted = Object.entries(classResults).sort((a,b)=>b[1].total - a[1].total);
    sorted.forEach(([reg, r], idx)=>{ r.rank = idx+1; });

    DB.data.results[exam][cls] = classResults;
    DB.save();
    U.toast("മാർക്കും റാങ്കും സേവ് ചെയ്തു");
  },

  viewTimetable(){
    const cls = document.getElementById("tv-class").value;
    const tt = DB.data.timetables[cls];
    const box = document.getElementById("tv-content");
    if(!tt){
      box.innerHTML = `<p class="muted" style="margin-top:8px;">ടൈംടേബിൾ ഇതുവരെ ചേർത്തിട്ടില്ല</p>`;
      return;
    }
    box.innerHTML = `<div class="divider"></div>
      <div style="font-weight:700; margin-bottom:6px;">${U.esc(tt.examName)}</div>
      <pre style="white-space:pre-wrap; font-family:inherit; font-size:13px; margin:0;">${U.esc(tt.content)}</pre>`;
  },

  // ---------- Monthly attendance summary ----------
  renderMonthly(){
    let html = `<h2 style="margin-bottom:14px;">📅 മാസം തിരിച്ചുള്ള ഹാജർ സംഗ്രഹം</h2>`;
    html += `<button class="outline-btn btn-block" style="margin-bottom:12px;" onclick="App.goTo('teacher-attendance')">← ഹാജർ പുസ്തകത്തിലേക്ക്</button>`;

    const classes = this.myClasses();
    if(classes.length === 0) return html;

    html += `<div class="form-group">
      <label>ക്ലാസ്സ്</label>
      <select id="mon-class" onchange="App.refresh()">
        ${classes.map(c=>`<option value="${c}" ${Teacher._monClass===c?'selected':''}>${CLASS_LABELS[c]}</option>`).join("")}
      </select>
    </div>`;

    const selClass = document.getElementById("mon-class") ? document.getElementById("mon-class").value : classes[0];
    Teacher._monClass = selClass;

    html += `<div class="form-group">
      <label>മാസം</label>
      <select id="mon-month" onchange="App.refresh()">
        ${ACADEMIC_MONTHS.map(m=>`<option value="${m.key}" ${Teacher._monMonth===m.key?'selected':''}>${m.label}</option>`).join("")}
      </select>
    </div>`;

    const selMonth = document.getElementById("mon-month") ? document.getElementById("mon-month").value : ACADEMIC_MONTHS[0].key;
    Teacher._monMonth = selMonth;

    const dates = U.datesInMonth(selMonth);
    if(dates.length === 0){
      html += `<div class="empty-state"><div class="emoji">📅</div>ഈ മാസം ഇതുവരെ ആരംഭിച്ചിട്ടില്ല</div>`;
      return html;
    }

    // Holiday dates for this class's shift in this month
    const holidayDates = dates.filter(d=>U.isHolidayForClass(d, selClass));
    if(holidayDates.length){
      html += `<div class="card">
        <div class="card-title">ഈ മാസത്തെ അവധി ദിവസങ്ങൾ</div>
        ${holidayDates.map(d=>{
          const h = (DB.data.holidayLog||[]).find(x=>x.date===d && (x.target==='all' || parseInt(x.target)===U.classShift(selClass)));
          return `<div class="row" style="font-size:13px;"><span>${U.displayDateFromStr(d)}</span><span class="muted">${h?U.esc(h.reason):''}</span></div>`;
        }).join("")}
      </div>`;
    }

    const students = U.studentsByClass(selClass);
    const workingDates = dates.filter(d=>!holidayDates.includes(d));

    html += `<div class="card">
      <div class="card-title">${CLASS_LABELS[selClass]} — ${ACADEMIC_MONTHS.find(m=>m.key===selMonth).label}</div>
      <div class="muted" style="margin-bottom:8px;">പ്രവർത്തി ദിവസങ്ങൾ: ${workingDates.length}</div>
      <table style="width:100%; font-size:12.5px;">
        <tr><th style="text-align:right;">കുട്ടി</th><th>ഹാജർ</th><th>അസാന്നിധ്യം</th><th>രേഖപ്പെടുത്താത്തത്</th></tr>
        ${students.map(s=>{
          let present=0, absent=0, none=0;
          workingDates.forEach(d=>{
            const status = (DB.data.attendance[d]||{})[s.id];
            if(status==='present') present++;
            else if(status==='absent') absent++;
            else none++;
          });
          return `<tr>
            <td style="text-align:right;">${U.esc(s.name)} <span class="muted">(${s.reg})</span></td>
            <td style="text-align:center; color:var(--moss); font-weight:700;">${present}</td>
            <td style="text-align:center; color:var(--rose); font-weight:700;">${absent}</td>
            <td style="text-align:center; color:#aaa;">${none}</td>
          </tr>`;
        }).join("")}
      </table>
    </div>`;

    return html;
  },

  // ---------- Monthly Attendance Summary ----------
  renderMonthly(){
    const classes = this.myClasses();
    const allDates = Object.keys(DB.data.attendance).sort();
    const monthsPresent = {};
    allDates.forEach(d=>{ const m=d.slice(0,7); monthsPresent[m]=true; });
    const availMonths = Object.keys(monthsPresent).sort();

    let selMonth = Teacher._selMonth || (availMonths.length ? availMonths[availMonths.length-1] : "");
    if(!selMonth && ACADEMIC_MONTHS.length) selMonth = ACADEMIC_MONTHS[0].key;

    let html = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <button class="outline-btn" onclick="App.goTo('teacher-attendance')">← തിരികെ</button>
      <h2>📅 മാസം തിരിച്ചുള്ള ഹാജർ</h2>
    </div>`;

    html += `<div class="form-group">
      <label>മാസം തിരഞ്ഞെടുക്കുക</label>
      <select id="monthly-month" onchange="Teacher._selMonth=this.value; App.goTo('teacher-monthly')">
        ${ACADEMIC_MONTHS.map(m=>`<option value="${m.key}" ${selMonth===m.key?'selected':''}>${m.label}</option>`).join("")}
      </select>
    </div>`;

    if(!selMonth){ html += `<p class="muted">ഈ മാസത്തിലെ ഹാജർ ഡേറ്റ ഇല്ല</p>`; return html; }

    const curVal = document.getElementById("monthly-month");
    const theMonth = (curVal ? curVal.value : selMonth) || selMonth;
    Teacher._selMonth = theMonth;

    // Get all dates in this month that have attendance data
    const monthDates = allDates.filter(d=>d.startsWith(theMonth)).sort();

    html += `<div class="card">
      <div class="card-title">ഹാജർ ഉള്ള ദിവസങ്ങൾ: ${monthDates.length}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">
        ${monthDates.map(d=>`<span class="pill">${U.displayDateFromStr(d)}</span>`).join("") || '<span class="muted">ഡേറ്റ ഇല്ല</span>'}
      </div>
    </div>`;

    // Per-class summary
    classes.forEach(cls=>{
      const students = U.studentsByClass(cls);
      if(!students.length) return;

      html += `<div class="card">
        <div class="card-title">${CLASS_LABELS[cls]}</div>
        <table style="width:100%;font-size:13px;border-collapse:collapse;">
          <tr style="text-align:center;border-bottom:1px solid var(--line);">
            <th style="text-align:left;padding:6px 4px;">കുട്ടി</th>
            <th style="padding:6px 4px;">ഹാജർ</th>
            <th style="padding:6px 4px;">അസാന്നിധ്യം</th>
            <th style="padding:6px 4px;">-</th>
          </tr>`;

      students.forEach(s=>{
        let p=0, ab=0, blank=0;
        monthDates.forEach(d=>{
          const st = (DB.data.attendance[d]||{})[s.id];
          if(st==='present') p++;
          else if(st==='absent') ab++;
          else blank++;
        });
        html += `<tr style="border-bottom:1px solid #f0ebe0;">
          <td style="padding:6px 4px;">${U.esc(s.name)}<br><span class="muted" style="font-size:11px;">Reg:${s.reg}</span></td>
          <td style="text-align:center;color:var(--moss);font-weight:700;">${p}</td>
          <td style="text-align:center;color:var(--rose);font-weight:700;">${ab}</td>
          <td style="text-align:center;color:#aaa;">${blank}</td>
        </tr>`;
      });
      html += `</table></div>`;
    });

    return html;
  }
};

// renderers_committee.js — Committee / Management Panel (View Only)

const Committee = {

  renderDashboard(){
    const data = DB.data;
    const totalStudents = data.students.length;
    const teacherCount = data.auth.staff.filter(s=>s.role==='teacher').length;

    const today = U.todayStr();
    const att = data.attendance[today] || {};
    let present=0, absent=0, notMarked=0;
    data.students.forEach(s=>{
      if(att[s.id]==='present') present++;
      else if(att[s.id]==='absent') absent++;
      else notMarked++;
    });

    let html = `<h2 style="margin-bottom:14px;">നിരീക്ഷണ ഡാഷ്ബോർഡ് (Monitoring Dashboard)</h2>`;
    html += `<div class="stat-grid">
      <div class="stat-card"><div class="num">${totalStudents}</div><div class="label">ആകെ കുട്ടികൾ</div></div>
      <div class="stat-card"><div class="num">${teacherCount}</div><div class="label">അധ്യാപകർ</div></div>
      <div class="stat-card"><div class="num">${present}</div><div class="label">ഇന്ന് ഹാജർ</div></div>
      <div class="stat-card"><div class="num">${absent}</div><div class="label">ഇന്ന് അസാന്നിധ്യം</div></div>
    </div>`;

    html += `<div class="section-title">ഇന്നത്തെ ക്ലാസ്സ് അനുസരിച്ച് ഹാജർ</div>`;
    CLASS_LIST.forEach(cls=>{
      const students = U.studentsByClass(cls);
      if(students.length===0) return;
      let p=0, a=0;
      students.forEach(s=>{
        if(att[s.id]==='present') p++;
        else if(att[s.id]==='absent') a++;
      });
      html += `<div class="card">
        <div class="row">
          <span class="card-title" style="margin-bottom:0;">${CLASS_LABELS[cls]}</span>
          <div>
            <span class="pill green">${p}</span> <span class="pill red">${a}</span> <span class="pill">${students.length - p - a} ബാക്കി</span>
          </div>
        </div>
      </div>`;
    });

    return html;
  },

  renderFees(){
    const data = DB.data;
    let totalCollected = 0;
    let totalExpected = 0;
    data.students.forEach(s=>{
      totalCollected += s.paidTotal;
      totalExpected += data.fees.annual;
    });
    const balance = Math.max(totalExpected - totalCollected, 0);

    let html = `<h2 style="margin-bottom:14px;">ഫീസ് കുടിശ്ശിക കണക്ക് (Fee Ledger)</h2>`;
    html += `<div class="stat-grid">
      <div class="stat-card"><div class="num">₹${totalCollected}</div><div class="label">പിരിഞ്ഞു കിട്ടിയത്</div></div>
      <div class="stat-card"><div class="num">₹${balance}</div><div class="label">ആകെ ബാക്കി കുടിശ്ശിക</div></div>
    </div>`;

    html += `<div class="section-title">ക്ലാസ്സ് അനുസരിച്ച് ഫീസ് നില</div>`;
    CLASS_LIST.forEach(cls=>{
      const students = U.studentsByClass(cls);
      if(students.length===0) return;
      let collected=0, expected=0;
      students.forEach(s=>{ collected+=s.paidTotal; expected+=data.fees.annual; });
      html += `<div class="card">
        <div class="row">
          <span class="card-title" style="margin-bottom:0;">${CLASS_LABELS[cls]}</span>
          <span class="muted">${students.length} കുട്ടികൾ</span>
        </div>
        <div class="row" style="margin-top:6px;">
          <span class="muted">പിരിഞ്ഞത്</span><strong>₹${collected}</strong>
        </div>
        <div class="row">
          <span class="muted">ബാക്കി</span><strong style="color:var(--rose);">₹${Math.max(expected-collected,0)}</strong>
        </div>
        <button class="outline-btn btn-block" style="margin-top:8px;" onclick="Committee.toggleMonthlyFee('${cls}')">മാസം തിരിച്ച് കാണുക</button>

      </div>`;
    });

    return html;
  },

  // Show, for each month, how many students in this class have paid (have that month checked in any payment)
  toggleMonthlyFee(cls){
    const box = document.getElementById("monthly-fee-"+cls);
    if(box.innerHTML !== ""){ box.innerHTML=""; return; }
    const students = U.studentsByClass(cls);
    let html = `<div class="divider"></div>`;
    ACADEMIC_MONTHS.forEach(m=>{
      const paidStudents = students.filter(s=>
        (s.payments||[]).some(p=>(p.months||[]).includes(m.key))
      );
      html += `<div class="row" style="font-size:12.5px; padding:3px 0;">
        <span>${m.label}</span>
        <span class="pill ${paidStudents.length>0?'green':''}">${paidStudents.length} / ${students.length}</span>
      </div>`;
    });
    if(students.some(s=>(s.payments||[]).some(p=>!p.months || p.months.length===0))){
      html += `<p class="muted" style="margin-top:6px;">⚠️ ചില പേയ്മെന്റുകളിൽ മാസം രേഖപ്പെടുത്തിയിട്ടില്ല.</p>`;
    }
    box.innerHTML = html;
  },

  renderStaff(){
    const data = DB.data;
    let html = `<h2 style="margin-bottom:14px;">അധ്യാപകരുടെ ഹാജർ നില (Staff Attendance)</h2>`;

    const teachers = data.auth.staff.filter(s=>s.role==='teacher');
    if(teachers.length===0){
      html += `<div class="empty-state"><div class="emoji">👨‍🏫</div>അധ്യാപകരെ ഇതുവരെ ചേർത്തിട്ടില്ല</div>`;
      return html;
    }

    // Month selector
    html += `<div class="form-group">
      <label>മാസം</label>
      <select id="staff-att-month" onchange="App.refresh()">
        ${ACADEMIC_MONTHS.map(m=>`<option value="${m.key}" ${Committee._staffMonth===m.key?'selected':''}>${m.label}</option>`).join("")}
      </select>
    </div>`;
    const selMonth = document.getElementById("staff-att-month") ? document.getElementById("staff-att-month").value : ACADEMIC_MONTHS[ACADEMIC_MONTHS.length-1].key;
    Committee._staffMonth = selMonth;
    const monthDates = U.datesInMonth(selMonth);

    teachers.forEach(t=>{
      const teacherShifts = Array.from(new Set((t.classes||[]).map(c=>U.classShift(c)).filter(Boolean)));
      const shiftLabel = teacherShifts.length ? teacherShifts.map(sh=>`ഷിഫ്റ്റ് ${sh}`).join(", ") : "ഷിഫ്റ്റ് നൽകിയിട്ടില്ല";

      let present=0, absent=0;
      const records = [];
      monthDates.forEach(date=>{
        // working day if at least one of teacher's shifts was not on holiday that day
        const workingShifts = teacherShifts.filter(sh => !((data.holidayLog||[]).some(h=>h.date===date && (h.target==='all' || parseInt(h.target)===sh))));
        if(workingShifts.length === 0) return; // holiday for all of teacher's shifts
        const status = (data.attendance[date]||{})[t.id];
        if(status === 'present'){ present++; records.push({date, status:'present'}); }
        else { absent++; records.push({date, status:'absent'}); }
      });

      html += `<div class="card">
        <div class="row">
          ${U.photoOrInitial(t.photo, t.name)}
          <div style="flex:1; margin-left:10px;">
            <div class="card-title" style="margin-bottom:2px;">${U.esc(t.name)}</div>
            <div class="muted">${shiftLabel} • ${t.classes && t.classes.length ? t.classes.map(c=>CLASS_LABELS[c]).join(", ") : ''}</div>
          </div>
        </div>
        <div class="row" style="margin-top:8px;">
          <span class="pill green">ഹാജർ: ${present}</span>
          <span class="pill red">അസാന്നിധ്യം: ${absent}</span>
        </div>
        ${records.length ? `
        <div class="divider"></div>
        <table>
          <tr><th>തീയതി</th><th>നില</th></tr>
          ${records.slice(-10).reverse().map(r=>`<tr><td>${U.displayDateFromStr(r.date)}</td><td>${r.status==='present'?'<span class="pill green">ഹാജർ</span>':'<span class="pill red">അസാന്നിധ്യം</span>'}</td></tr>`).join("")}
        </table>` : `<p class="muted" style="margin-top:8px;">ഈ മാസം ഇതുവരെ പ്രവർത്തി ദിവസങ്ങൾ ഇല്ല</p>`}
      </div>`;
    });

    return html;
  }
};

        html += `<p class="muted">ഈ പരീക്ഷയിൽ കുട്ടിയുടെ മാർക്ക് ഇതുവരെ ചേർത്തിട്ടില്ല</p>`;
      }

      // class ranking
      html += `<div class="divider"></div>
        <div class="card-title" style="font-size:13px;">ക്ലാസ്സ് റാങ്ക് ലിസ്റ്റ്</div>
        <table><tr><th>റാങ്ക്</th><th>പേര്</th><th>ആകെ</th></tr>`;
      const sorted = Object.entries(classResults).sort((a,b)=>a[1].rank-b[1].rank);
      sorted.forEach(([reg, r])=>{
        const student = U.studentByReg(reg);
        const isMe = reg === s.reg;
        html += `<tr style="${isMe?'background:#e7f0ea;':''}"><td>${r.rank}</td><td>${student?U.esc(student.name):reg}</td><td>${r.total}</td></tr>`;
      });
      html += `</table></div>`;
    });

    return html;
  },

  // ---------- Profile ----------
  renderProfile(){
    const s = this.me();

    html += `<div class="card">
      <div class="form-group"><label>കുട്ടിയുടെ പേര് (മാറ്റാൻ കഴിയില്ല)</label><input type="text" value="${U.esc(s.name)}" disabled></div>

      <div class="form-group"><label>ജനനത്തീയതി (മാറ്റാൻ കഴിയില്ല)</label><input type="text" value="${U.esc(s.dob)}" disabled></div>
      <div class="divider"></div>

      <div class="form-group"><label>ഫോൺ നമ്പർ (തിരുത്താം)</label><input type="text" id="p-phone" value="${U.esc(s.phone)}"></div>

    </div>`;

    html += `<div class="card">
      <div class="card-title">പാസ്‌വേർഡ് മാറ്റുക</div>
      <div class="form-group"><label>പുതിയ പാസ്‌വേർഡ്</label><input type="text" id="p-newpass" placeholder="പുതിയ പാസ്‌വേർഡ് ടൈപ്പ് ചെയ്യുക"></div>
      <button class="secondary-btn" onclick="Parent.changePassword()">പാസ്‌വേർഡ് സേവ് ചെയ്യുക</button>
    </div>`;

    return html;
  },

  saveProfile(){
    const s = this.me();
    s.parentName = document.getElementById("p-parent").value.trim();
    s.phone = document.getElementById("p-phone").value.trim();
    const fileInput = document.getElementById("p-photo");
    const finish = ()=>{
      DB.save();
      U.toast("പ്രൊഫൈൽ സേവ് ചെയ്തു");
      App.refresh();
      App.setTopbarRole();
    };
    if(fileInput.files[0]){
      U.readPhotoFile(fileInput.files[0], (data64)=>{ s.photo=data64; finish(); });
    } else finish();
  },

  changePassword(){
    const pass = document.getElementById("p-newpass").value.trim();
    if(!pass){ U.toast("പാസ്‌വേർഡ് ടൈപ്പ് ചെയ്യുക"); return; }
    const s = this.me();
    s.parentPassword = pass;
    DB.save();
    U.toast("പാസ്‌വേർഡ് മാറ്റി");
  }
};

const Public = {

  currentTab: 'results',

  render(){
    let html = `<div class="btn-grid" style="margin-bottom:14px;">
      <button class="${this.currentTab==='results'?'primary-btn':'outline-btn'}" onclick="Public.switchTab('results')">📋 റിസൾട്ട്</button>
      <button class="${this.currentTab==='staff'?'primary-btn':'outline-btn'}" onclick="Public.switchTab('staff')">👨‍🏫 സ്റ്റാഫ് / കമ്മിറ്റി</button>
    </div>`;

    if(this.currentTab === 'staff'){
      html += this.renderStaffDirectory();
      return html;
    }

    html += `<h2 style="margin-bottom:14px;">റിസൾട്ട് കാണുക (View Results)</h2>`;
    const exams = Object.keys(DB.data.results);
    if(exams.length===0){
      return html + `<div class="empty-state"><div class="emoji">📋</div>റിസൾട്ടുകൾ ഇതുവരെ പ്രസിദ്ധീകരിച്ചിട്ടില്ല</div>`;
    }

    html += `<div class="form-group">
      <label>പരീക്ഷ തിരഞ്ഞെടുക്കുക</label>
      <select id="pub-exam" onchange="Public.refresh()">
        ${exams.map(e=>`<option value="${U.esc(e)}">${U.esc(e)}</option>`).join("")}
      </select>
    </div>`;

    const selExam = document.getElementById("pub-exam") ? document.getElementById("pub-exam").value : exams[0];
    const examData = DB.data.results[selExam] || {};
    const classesWithResults = Object.keys(examData).filter(c=>CLASS_LIST.includes(c));

    html += `<div class="form-group">
      <label>ക്ലാസ്സ് തിരഞ്ഞെടുക്കുക</label>
      <select id="pub-class" onchange="Public.refresh()">
        ${classesWithResults.map(c=>`<option value="${c}">${CLASS_LABELS[c]}</option>`).join("")}
      </select>
    </div>`;

    const selClass = document.getElementById("pub-class") ? document.getElementById("pub-class").value : classesWithResults[0];
    html += `<div id="pub-result-area">${this.resultArea(selExam, selClass)}</div>`;
    html += `<button class="primary-btn" style="margin-top:10px;" onclick="window.print()">പ്രിന്റ് / PDF ഡൗൺലോഡ്</button>`;
    return html;
  },

  refresh(){
    const exam = document.getElementById("pub-exam").value;
    document.getElementById("public-container").innerHTML = this.render();
  },

  resultArea(exam, cls){
    if(!exam || !cls) return `<p class="muted">തിരഞ്ഞെടുക്കുക</p>`;
    const classResults = (DB.data.results[exam] || {})[cls];
    if(!classResults) return `<p class="muted">ഈ ക്ലാസ്സിന് റിസൾട്ട് ലഭ്യമല്ല</p>`;

    const sorted = Object.entries(classResults).sort((a,b)=>a[1].rank-b[1].rank);

    let html = `<div class="section-title">മികച്ച വിജയം നേടിയവർ (Toppers)</div>`;
    sorted.slice(0,3).forEach(([reg,r])=>{
      const student = U.studentByReg(reg);
      if(!student) return;
      html += `<div class="topper-card ${r.rank===1?'rank1':''}">
        <div class="rank-badge">റാങ്ക് ${r.rank}</div>
        ${student.photo ? `<img src="${student.photo}" class="topper-photo">` : `<div class="topper-photo">${U.esc(U.initials(student.name))}</div>`}
        <div style="font-weight:700; font-size:15px;">${U.esc(student.name)}</div>
        <div class="muted">${CLASS_LABELS[student.cls]} • Reg No: ${student.reg}</div>
        <div style="margin-top:6px; font-weight:700; color:var(--moss-deep);">ആകെ മാർക്ക്: ${r.total}</div>
      </div>`;
    });

    html += `<div class="section-title">മുഴുവൻ റാങ്ക് ലിസ്റ്റ്</div>
      <div class="card"><table><tr><th>റാങ്ക്</th><th>പേര്</th><th>ആകെ</th></tr>
      ${sorted.map(([reg,r])=>{
        const student = U.studentByReg(reg);
        return `<tr><td>${r.rank}</td><td>${student?U.esc(student.name):reg}</td><td>${r.total}</td></tr>`;
      }).join("")}
      </table></div>`;

    return html;
  },

  switchTab(tab){
    this.currentTab = tab;
    document.getElementById("public-container").innerHTML = this.render();
  },

  renderStaffDirectory(){
    let html = `<h2 style="margin-bottom:14px;">സ്റ്റാഫ് & കമ്മിറ്റി (Staff & Committee)</h2>`;

    // Committee first, in a sensible order
    const roleOrder = ["president","gs","joint-secretary","manager","committee"];
    const committee = DB.data.auth.staff
      .filter(s => App.COMMITTEE_ROLES.includes(s.role))
      .sort((a,b)=> roleOrder.indexOf(a.role) - roleOrder.indexOf(b.role));

    if(committee.length){
      html += `<div class="section-title">കമ്മിറ്റി / ഭാരവാഹികൾ</div>`;
      committee.forEach(c=>{
        html += `<div class="card">
          <div class="row">
            ${U.photoOrInitial(c.photo, c.name)}
            <div style="flex:1; margin-left:10px;">
              <div style="font-weight:700;">${U.esc(c.name)}</div>
              <div class="muted">${App.ROLE_LABELS[c.role] || 'കമ്മിറ്റി'}</div>
              <div class="muted">${U.esc(c.phone)}</div>
            </div>
            ${c.phone ? `<a class="link-btn" href="tel:${c.phone}">വിളിക്കുക</a>` : ""}
          </div>
        </div>`;
      });
    }

    // Sadhar
    html += `<div class="section-title">സദർ</div>`;
    html += `<div class="card">
      <div class="row">
        ${U.photoOrInitial(DB.data.auth.sadhar.photo || "", DB.data.auth.sadhar.name || "സദർ")}
        <div style="flex:1; margin-left:10px;">
          <div style="font-weight:700;">${U.esc(DB.data.auth.sadhar.name || "സദർ")}</div>
          <div class="muted">സദർ (Sadhar)</div>
          ${DB.data.auth.sadhar.phone ? `<div class="muted">${U.esc(DB.data.auth.sadhar.phone)}</div>` : ""}
        </div>
        ${DB.data.auth.sadhar.phone ? `<a class="link-btn" href="tel:${DB.data.auth.sadhar.phone}">വിളിക്കുക</a>` : ""}
      </div>
    </div>`;

    // Teachers
    const teachers = DB.data.auth.staff.filter(s=>s.role==='teacher');
    if(teachers.length){
      html += `<div class="section-title">അധ്യാപകർ (Teachers)</div>`;
      teachers.forEach(t=>{
        html += `<div class="card">
          <div class="row">
            ${U.photoOrInitial(t.photo, t.name)}
            <div style="flex:1; margin-left:10px;">
              <div style="font-weight:700;">${U.esc(t.name)}</div>
              <div class="muted">${t.classes && t.classes.length ? t.classes.map(c=>CLASS_LABELS[c]).join(", ") : "അധ്യാപകൻ"}</div>
              <div class="muted">${U.esc(t.phone)}</div>
            </div>
            ${t.phone ? `<a class="link-btn" href="tel:${t.phone}">വിളിക്കുക</a>` : ""}
          </div>
        </div>`;
      });
    }

    if(committee.length===0 && teachers.length===0){
      html += `<div class="empty-state"><div class="emoji">👨‍🏫</div>ഇതുവരെ ജീവനക്കാരെ ചേർത്തിട്ടില്ല</div>`;
    }

    return html;
  }
};

// ===========================================================
// app.js — Core application logic
// ===========================================================

const App = {
  user: null, // {type:'sadhar'|'teacher'|'president'|'gs'|'joint-secretary'|'manager'|'committee'|'parent', ...}
  currentTab: null,

  COMMITTEE_ROLES: ["president","gs","joint-secretary","manager","committee"],
  ROLE_LABELS: {
    teacher: "അധ്യാപകൻ (Teacher)",
    president: "പ്രസിഡണ്ട് (President)",
    gs: "ജനറൽ സെക്രട്ടറി (General Secretary)",
    "joint-secretary": "ജോയിന്റ് സെക്രട്ടറി (Joint Secretary)",
    manager: "മാനേജർ (Manager)",
    committee: "കമ്മിറ്റി അംഗം (Committee Member)"
  },

  isCommittee(type){
    return this.COMMITTEE_ROLES.includes(type);
  },

  init(){
    DB.load();
    const overlay = document.getElementById("sync-overlay");
    CLOUD_AUTH_READY.then(()=>{
      DB.initCloudSync(()=>{
        if(overlay) overlay.style.display = "none";
        const session = sessionStorage.getItem("madrasa_session");
        if(session){
          try{
            this.user = JSON.parse(session);
            this.showApp();
          }catch(e){
            this.showLogin();
          }
        } else {
          this.showLogin();
        }
      });
    });
  },

  // Manual sync button (topbar) — pull latest data from cloud and refresh.
  manualSync(){
    const btn = document.getElementById("sync-btn");
    if(btn) btn.classList.add("spinning");
    DB.syncFromCloud((updated, err)=>{
      if(btn) btn.classList.remove("spinning");
      if(err === "not-configured"){
        U.toast("ക്ലൗഡ് സിങ്ക് സെറ്റ് ചെയ്തിട്ടില്ല");
      } else if(err === "fetch-failed" || (typeof err === 'object' && err !== null)){
        // Network/Firebase reachability issue — try pushing local data to cloud instead
        U.toast("ക്ലൗഡിൽ നിന്ന് ലഭിക്കുന്നില്ല — local data push ചെയ്യുന്നു...");
        DB.pushToCloud();
      } else if(updated){
        U.toast("പുതിയ ഡാറ്റ ലഭിച്ചു ✅");
        this.refresh();
        this.renderNav();
        this.setTopbarRole();
      } else {
        // Local is up to date — push to cloud to ensure cloud is in sync
        DB.pushToCloud();
        U.toast("ഡാറ്റ പുതിയത് തന്നെ ✅");
      }
    });
  },

  showLogin(){
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("main-app").style.display = "none";
  },

  showApp(){
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-app").style.display = "block";
    this.renderNav();
    this.goTo(this.defaultTab());
    this.setTopbarRole();
  },

  setTopbarRole(){
    const u = this.user;
    let label = "";
    if(u.type === "sadhar") label = "സദർ പാനൽ";
    else if(u.type === "teacher") label = (u.name || "അധ്യാപകൻ") + " — ടീച്ചർ പാനൽ";
    else if(this.isCommittee(u.type)) label = (u.name || "കമ്മിറ്റി") + " — " + (this.ROLE_LABELS[u.type] || "മാനേജ്മെന്റ്");
    else if(u.type === "parent") label = (u.studentName || "") + " — രക്ഷിതാവ്";
    document.getElementById("topbar-role").textContent = label;
  },

  login(){
    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;
    const errBox = document.getElementById("login-error");
    errBox.textContent = "";

    if(!username || !password){
      errBox.textContent = "യൂസർനെയിമും പാസ്‌വേർഡും നൽകുക.";
      return;
    }

    const data = DB.data;

    // 1. Sadhar
    if(username === data.auth.sadhar.username && password === data.auth.sadhar.password){
      this.user = { type: "sadhar" };
      sessionStorage.setItem("madrasa_session", JSON.stringify(this.user));
      this.showApp();
      return;
    }

    // 2. Staff (teacher/committee)
    const staff = data.auth.staff.find(s => s.username === username && s.password === password);
    if(staff){
      this.user = { type: staff.role, id: staff.id, name: staff.name, classes: staff.classes || [] };
      sessionStorage.setItem("madrasa_session", JSON.stringify(this.user));
      this.showApp();
      return;
    }

    // 3. Parent (username = student reg no)
    const student = data.students.find(s => s.reg === username);
    if(student && student.parentPassword && student.parentPassword === password){
      this.user = { type: "parent", studentId: student.id, studentReg: student.reg, studentName: student.name };
      sessionStorage.setItem("madrasa_session", JSON.stringify(this.user));
      this.showApp();
      return;
    }
    // Allow default parent password = reg no itself if not yet set
    if(student && !student.parentPassword && password === student.reg){
      this.user = { type: "parent", studentId: student.id, studentReg: student.reg, studentName: student.name };
      sessionStorage.setItem("madrasa_session", JSON.stringify(this.user));
      this.showApp();
      return;
    }

    errBox.textContent = "യൂസർനെയിമോ പാസ്‌വേർഡോ തെറ്റാണ്. വീണ്ടും ശ്രമിക്കുക.";
  },

  logout(){
    sessionStorage.removeItem("madrasa_session");
    this.user = null;
    document.getElementById("login-username").value = "";
    document.getElementById("login-password").value = "";
    document.getElementById("login-error").textContent = "";
    this.showLogin();
  },

  showPublicResults(){
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("public-screen").style.display = "block";
    document.getElementById("public-container").innerHTML = Public.render();
  },

  hidePublicResults(){
    document.getElementById("public-screen").style.display = "none";

  renderNav(){

    nav.innerHTML = "";
    this.navConfig().forEach(item => {
      const btn = document.createElement("button");
      btn.className = "nav-btn";
      btn.id = "navbtn-" + item.id;
      btn.innerHTML = `<span class="nav-icon">${item.icon}</span><span>${item.label}</span>`;
      btn.onclick = () => this.goTo(item.id);
      nav.appendChild(btn);

  goTo(tabId){
    this.currentTab = tabId;
    // update nav active state
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    const navBtn = document.getElementById("navbtn-" + tabId);
    if(navBtn) navBtn.classList.add("active");

    const container = document.getElementById("app-container");
    try{
      container.innerHTML = Renderers.render(tabId);
    } catch(err){
      console.error("Render error:", err);
      container.innerHTML = `<div class="card" style="margin:20px; background:#fdecea;">
        <div style="font-weight:700; color:var(--rose); margin-bottom:8px;">⚠️ പേജ് load ആകുന്നില്ല</div>
        <p class="muted" style="font-size:13px;">${err.message}</p>
        <button class="primary-btn" style="margin-top:12px;" onclick="App.refresh()">↺ വീണ്ടും ശ്രമിക്കുക</button>

    }
    window.scrollTo(0,0);
  },

  refresh(){
    this.goTo(this.currentTab);
  }
};

// ===========================================================
// Helper utilities
// ===========================================================
const U = {
  toast(msg, ms=2200){
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(()=> el.classList.remove("show"), ms);
  },

  uid(prefix="ID"){
    return prefix + Date.now().toString(36) + Math.floor(Math.random()*1000);
  },

  todayStr(){
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0') + "-" + String(d.getDate()).padStart(2,'0');
  },

  todayDisplay(){
    const d = new Date();
    return String(d.getDate()).padStart(2,'0') + "/" + String(d.getMonth()+1).padStart(2,'0') + "/" + d.getFullYear();
  },

  // Convert "YYYY-MM-DD" to "DD/MM/YYYY"
  displayDateFromStr(dateStr){
    const parts = dateStr.split("-");
    if(parts.length !== 3) return dateStr;
    return `${parts[2]}/${parts[1]}/${parts[0]}`;
  },

  // After dynamically changing content inside an open accordion, recalc its max-height
  // so the new (taller) content isn't clipped.
  fixAccordionHeight(el){
    let node = el;
    while(node && node !== document.body){
      if(node.classList && node.classList.contains('accordion-item') && node.classList.contains('open')){
        const body = node.querySelector('.accordion-body');
        if(body) body.style.maxHeight = body.scrollHeight + 'px';
        return;
      }
      node = node.parentElement;
    }
  },

  // Return all date strings ("YYYY-MM-DD") for a given month ("YYYY-MM"),
  // clamped to academic year start (2026-06-01) and today.
  datesInMonth(monthKey){
    const [y, m] = monthKey.split("-").map(Number);
    const daysInMonth = new Date(y, m, 0).getDate();
    const start = new Date("2026-06-01T00:00:00");
    const today = new Date();
    today.setHours(0,0,0,0);
    const dates = [];
    for(let d=1; d<=daysInMonth; d++){
      const dt = new Date(y, m-1, d);
      if(dt < start) continue;
      if(dt > today) continue;
      const ds = dt.getFullYear() + "-" + String(dt.getMonth()+1).padStart(2,'0') + "-" + String(dt.getDate()).padStart(2,'0');
      dates.push(ds);
    }
    return dates;
  },

  // "മകൻ" / "മകൾ" based on gender field, fallback to "മകൻ/മകൾ"
  childWord(student){
    if(student.gender === 'm') return "മകൻ";
    if(student.gender === 'f') return "മകൾ";
    return "മകൻ/മകൾ";
  },

  esc(str){
    if(str === undefined || str === null) return "";
    return String(str).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  },

  studentById(id){
    return DB.data.students.find(s => s.id === id);
  },
  studentByReg(reg){
    return DB.data.students.find(s => s.reg === reg);
  },
  studentsByClass(cls){
    return DB.data.students.filter(s => s.cls === cls);
  },

  classShift(cls){
    for(const sk of [1,2,3]){
      if(DB.data.shifts[sk].classes.includes(cls)) return sk;
    }
    return null;
  },

  // Check holidayLog for whether a given class's shift was on holiday on dateStr
  isHolidayForClass(dateStr, cls){
    const shift = this.classShift(cls);
    return (DB.data.holidayLog || []).some(h => h.date === dateStr && (h.target === "all" || parseInt(h.target) === shift));
  },


  shiftHoliday(shiftKey){
    const h = DB.data.holidays;
    if(h["all"] && h["all"].active) return h["all"];
    if(h[String(shiftKey)] && h[String(shiftKey)].active) return h[String(shiftKey)];
    return null;
  },

  initials(name){
    if(!name) return "?";
    return name.trim().charAt(0);
  },

  photoOrInitial(photo, name, cls="photo-circle"){
    if(photo){
      return `<img src="${photo}" class="${cls}" alt="">`;
    }
    return `<div class="${cls}">${U.esc(U.initials(name))}</div>`;
  },

  // WhatsApp link opener
  sendWhatsApp(phone, message){
    let p = (phone || "").replace(/\D/g,"");
    if(p.length === 10) p = "91" + p;
    const url = `https://wa.me/${p}?text=${encodeURIComponent(message)}`;
    window.open(url, "_blank");
  },

  readImageFile(file, callback){
    const reader = new FileReader();
    reader.onload = (e) => callback(e.target.result);
    reader.readAsDataURL(file);
  },

  // Like readImageFile, but resizes/compresses the image first (max 480px,
  // JPEG quality ~0.72). Used for all people-photos (sadhar, staff,
  // students) so that — now that photos are included in cloud sync —
  // the synced payload stays small and fast even with 100+ photos.
  // (Not used for the fee QR code, which must stay pixel-accurate.)
  readPhotoFile(file, callback){
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 480;
        let { width, height } = img;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        try{
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          callback(canvas.toDataURL('image/jpeg', 0.72));
        }catch(err){
          callback(e.target.result); // fallback to original on any canvas error
        }
      };
      img.onerror = () => callback(e.target.result);
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  },

  // Generate fee receipt message. recipientType: 'parent' | 'gs' | 'manager'
  feeMessage(student, paidNow, dateStr, months, recipientType){
    const totalPaid = student.paidTotal;
    const annual = DB.data.fees.annual;
    const balance = Math.max(annual - totalPaid, 0);
    const collectorName = (App.user && App.user.name) ? App.user.name : "സ്റ്റാഫ്";
    const collectorRole = (App.user && App.user.type === 'sadhar') ? "സദർ" : "ക്ലാസ്സ് അധ്യാപകൻ";
    const monthsText = (months && months.length) ? ` (${months.map(mk=>MONTH_LABELS[mk]||mk).join(", ")} മാസത്തെ ഫീസ്)` : "";

    let greeting;
    if(recipientType === 'gs') greeting = "അസ്സലാമു അലൈക്കും, പ്രിയപ്പെട്ട ജനറൽ സെക്രട്ടറി,";
    else if(recipientType === 'manager') greeting = "അസ്സലാമു അലൈക്കും, പ്രിയപ്പെട്ട മാനേജർ,";
    else greeting = "അസ്സലാമു അലൈക്കും, പ്രിയപ്പെട്ട രക്ഷിതാവേ,";

    let body;
    if(recipientType === 'parent'){
      body = `നിങ്ങളുടെ ${U.childWord(student)} ${student.name} (${CLASS_LABELS[student.cls] || student.cls}, Reg No: ${student.reg}) ${dateStr} തീയതിയിൽ മദ്റസയിൽ ₹${paidNow} ഫീസ്${monthsText} അടച്ചിട്ടുണ്ട്. ഇത് ${collectorName} (${collectorRole}) കൈപ്പറ്റിയിരിക്കുന്നു. ആകെ അടച്ച തുക: ₹${totalPaid}, ഇനി അടക്കാനുള്ള ബാക്കി കുടിശ്ശിക തുക: ₹${balance}.`;
    } else {
      body = `${CLASS_LABELS[student.cls] || student.cls} ക്ലാസ്സിൽ പഠിക്കുന്ന ${student.name} (Reg No: ${student.reg}) ${dateStr} തീയതിയിൽ മദ്റസയിൽ ₹${paidNow} ഫീസ്${monthsText} അടച്ചിട്ടുണ്ട്. ഇത് ${collectorName} (${collectorRole}) കൈപ്പറ്റിയിരിക്കുന്നു. ആകെ അടച്ച തുക: ₹${totalPaid}, ഇനി അടക്കാനുള്ള ബാക്കി കുടിശ്ശിക തുക: ₹${balance}.`;
    }

    return `${greeting}\n\n${body}\n\nനന്ദി. - മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്.`;
  },

  // Returns a Set of month-keys already covered by any payment for this student.
  // If excludePaymentIndex is given, that payment's own months are not counted (so they remain selectable while editing it).
  paidMonthsSet(student, excludePaymentIndex){
    const set = new Set();
    (student.payments||[]).forEach((p,i)=>{
      if(i === excludePaymentIndex) return;
      (p.months||[]).forEach(m=>set.add(m));
    });
    return set;
  },

  // accordion toggle
  toggleAccordion(id){
    const el = document.getElementById(id);
    if(!el) return;
    const wasOpen = el.classList.contains("open");
    el.classList.toggle("open");
    const body = el.querySelector(".accordion-body");
    if(!wasOpen){
      body.style.maxHeight = body.scrollHeight + "px";
    } else {
      body.style.maxHeight = "0px";
    }
  }
};
