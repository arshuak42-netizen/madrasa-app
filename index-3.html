const FeeShared = {
  allowedClasses: null, // null = no restriction (Sadhar); array of class keys = restricted (Teacher)

  render(allowedClasses){
    this.allowedClasses = allowedClasses;
    let html = `<div class="card">
      <div class="form-group">
        <label>കുട്ടിയുടെ രജിസ്റ്റർ നമ്പർ</label>
        <input type="text" id="fee-reg" inputmode="numeric" oninput="FeeShared.lookupStudent()" placeholder="ഉദാ: 691">
      </div>
      <div id="fee-student-info"></div>
    </div>`;
    return html;
  },

  lookupStudent(){
    const reg = (document.getElementById("fee-reg")||{}).value||"";
    const infoBox = document.getElementById("fee-student-info");
    if(!infoBox) return;
    if(!reg.trim()){ infoBox.innerHTML=""; return; }
    const s = U.studentByReg(reg.trim());
    if(!s){
      infoBox.innerHTML = `<p class="muted" style="margin-top:8px;">കുട്ടിയെ കണ്ടെത്താനായില്ല</p>`;
      return;
    }
    if(this.allowedClasses && !this.allowedClasses.includes(s.cls)){
      infoBox.innerHTML = `<p style="margin-top:8px; color:var(--rose); font-weight:600;">⚠️ ${CLASS_LABELS[s.cls]||s.cls} ക്ലാസ്സിലെ കുട്ടികളുടെ ഫീസ് നിങ്ങൾക്ക് കൈകാര്യം ചെയ്യാൻ അനുവാദമില്ല. നിങ്ങളുടെ ക്ലാസ്സിലെ കുട്ടിയുടെ Reg No നൽകുക.</p>`;
      return;
    }
    infoBox.innerHTML = this.studentHtml(s);
    U.fixAccordionHeight(infoBox);
  },

  studentHtml(s){
    const balance = Math.max(DB.data.fees.annual - s.paidTotal, 0);
    const payHist = (s.payments||[]).slice().reverse();
    const paidMonths = U.paidMonthsSet(s);

    let histHtml = "";
    if(payHist.length){
      histHtml = `<div class="divider"></div>
        <div class="card-title" style="font-size:14px; margin-bottom:8px;">📋 ഫീസ് ഹിസ്റ്ററി (Payment History)</div>`;
      payHist.forEach((p,revIdx)=>{
        const idx = (s.payments.length - 1) - revIdx;
        const monthsText = (p.months&&p.months.length) ? p.months.map(mk=>MONTH_LABELS[mk]||mk).join(", ") : "—";
        const msgParent = U.feeMessage(s, p.amount, p.date, p.months||[], 'parent');
        const msgGs = U.feeMessage(s, p.amount, p.date, p.months||[], 'gs');
        const msgMgr = U.feeMessage(s, p.amount, p.date, p.months||[], 'manager');
        histHtml += `<div class="card" style="margin-bottom:8px; background:#f8f5ef;">
          <div class="row" style="margin-bottom:4px;">
            <span style="font-weight:700;">₹${p.amount}</span>
            <span class="muted" style="font-size:12px;">${p.date}</span>
          </div>
          <div class="muted" style="font-size:12px; margin-bottom:8px;">മാസം: ${monthsText}</div>
          <div class="btn-grid">
            <button class="btn-wa" onclick='U.sendWhatsApp("${s.phone}", ${JSON.stringify(msgParent)})'>📩 രക്ഷിതാവിന്</button>
            <button class="btn-wa" onclick='FeeShared.sendToSecretary(${JSON.stringify(msgGs)})'>📩 സെക്രട്ടറിക്ക്</button>
            <button class="btn-wa" onclick='FeeShared.sendToManager(${JSON.stringify(msgMgr)})'>📩 മാനേജർക്ക്</button>
            <button class="btn-small" onclick="FeeShared.startEditPayment('${s.id}',${idx})">✏️ തിരുത്ത്</button>
          </div>
          <div id="fee-edit-area-${s.id}-${idx}"></div>
        </div>`;
      });
    }

    const availableMonths = ACADEMIC_MONTHS.filter(m=>!paidMonths.has(m.key));
    const monthCheckboxHtml = availableMonths.length
      ? `<div class="month-grid">
          ${availableMonths.map(m=>`
            <label class="month-chip">
              <input type="checkbox" value="${m.key}" class="fee-month-cb">
              <span>${m.label}</span>
            </label>
          `).join("")}
        </div>`
      : `<p class="muted">✅ ഇതുവരെ ലഭ്യമായ എല്ലാ മാസത്തെയും ഫീസ് അടച്ചു കഴിഞ്ഞു.</p>`;

    return `
      <div class="divider"></div>
      <div class="row">
        ${U.photoOrInitial(s.photo, s.name)}
        <div style="flex:1; margin-left:10px;">
          <div class="card-title" style="margin-bottom:2px;">${U.esc(s.name)}</div>
          <div class="muted">${CLASS_LABELS[s.cls]} • Reg No: ${s.reg}</div>
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <span class="muted">ആകെ അടച്ച തുക</span><strong>₹${s.paidTotal}</strong>
      </div>
      <div class="row">
        <span class="muted">ബാക്കി കുടിശ്ശിക</span><strong style="color:var(--rose);">₹${balance}</strong>
      </div>
      <div class="divider"></div>
      <div class="card-title" style="font-size:14px; margin-bottom:8px;">➕ പുതിയ ഫീസ് ചേർക്കുക</div>
      <div class="form-group">
        <label>ഏത് മാസത്തെ ഫീസ്? (ഒന്നോ അധികമോ)</label>
        ${monthCheckboxHtml}
      </div>
      <div class="form-group">
        <label>ഇപ്പോൾ അടക്കുന്ന തുക (₹)</label>
        <input type="number" id="fee-amount" placeholder="0">
      </div>
      <button class="primary-btn btn-block" onclick="FeeShared.collectFee('${s.id}')">ഫീസ് സ്വീകരിക്കുക</button>
      ${histHtml}
    `;
  },

  startEditPayment(studentId, paymentIndex){
    const s = U.studentById(studentId);
    const p = s.payments[paymentIndex];
    const areaId = `fee-edit-area-${studentId}-${paymentIndex}`;
    const area = document.getElementById(areaId);
    if(!area) return;
    const paidMonths = U.paidMonthsSet(s, paymentIndex); // exclude this payment's own months
    area.innerHTML = `
      <div class="divider"></div>
      <div style="font-weight:700; margin-bottom:8px;">✏️ പേയ്മെന്റ് തിരുത്തുക</div>
      <div class="form-group">
        <label>തുക (₹)</label>
        <input type="number" id="edit-fee-amount-${studentId}-${paymentIndex}" value="${p.amount}">
      </div>
      <div class="form-group">
        <label>മാസങ്ങൾ</label>
        <div class="month-grid">
          ${ACADEMIC_MONTHS.map(m=>{
            const alreadyPaidElsewhere = paidMonths.has(m.key);
            const checked = (p.months||[]).includes(m.key);
            if(alreadyPaidElsewhere && !checked) return ""; // hide months paid by other entries
            return `<label class="month-chip">
              <input type="checkbox" value="${m.key}" class="edit-month-${studentId}-${paymentIndex}" ${checked?'checked':''}>
              <span>${m.label}</span>
            </label>`;
          }).join("")}
        </div>
      </div>
      <div class="btn-grid">
        <button class="primary-btn" onclick="FeeShared.savePaymentEdit('${studentId}',${paymentIndex})">✅ സേവ്</button>
        <button class="btn-danger" onclick="FeeShared.deletePayment('${studentId}',${paymentIndex})">🗑️ ഡിലീറ്റ്</button>
      </div>
    `;
  },

  savePaymentEdit(studentId, paymentIndex){
    const s = U.studentById(studentId);
    const newAmount = parseFloat((document.getElementById(`edit-fee-amount-${studentId}-${paymentIndex}`)||{}).value||"0");
    if(!newAmount||newAmount<=0){ U.toast("ശരിയായ തുക നൽകുക"); return; }
    const months = Array.from(document.querySelectorAll(`.edit-month-${studentId}-${paymentIndex}`))
      .filter(cb=>cb.checked).map(cb=>cb.value);
    const oldAmount = s.payments[paymentIndex].amount;
    s.paidTotal = s.paidTotal - oldAmount + newAmount;
    s.payments[paymentIndex].amount = newAmount;
    s.payments[paymentIndex].months = months;
    DB.save();
    U.toast("പേയ്മെന്റ് തിരുത്തി");
    (()=>{ const box=document.getElementById("fee-student-info"); box.innerHTML = FeeShared.studentHtml(s); U.fixAccordionHeight(box); })();
  },

  deletePayment(studentId, paymentIndex){
    const s = U.studentById(studentId);
    const removed = s.payments.splice(paymentIndex,1)[0];
    s.paidTotal = Math.max(0, s.paidTotal - removed.amount);
    DB.save();
    U.toast("പേയ്മെന്റ് നീക്കം ചെയ്തു");
    (()=>{ const box=document.getElementById("fee-student-info"); box.innerHTML = FeeShared.studentHtml(s); U.fixAccordionHeight(box); })();
  },

  collectFee(studentId){
    const amount = parseFloat((document.getElementById("fee-amount")||{}).value||"0");
    if(!amount||amount<=0){ U.toast("തുക നൽകുക"); return; }
    const months = Array.from(document.querySelectorAll('.fee-month-cb'))
      .filter(cb=>cb.checked).map(cb=>cb.value);
    const s = U.studentById(studentId);
    s.paidTotal += amount;
    const date = U.todayDisplay();
    s.payments.push({ amount, date, months });
    DB.save();
    U.toast(`₹${amount} ഫീസ് രേഖപ്പെടുത്തി ✅`);
    (()=>{ const box=document.getElementById("fee-student-info"); box.innerHTML = FeeShared.studentHtml(s); U.fixAccordionHeight(box); })();
  },

  sendToSecretary(msg){
    let sec = DB.data.auth.staff.find(s=>s.role==='gs');
    if(!sec) sec = DB.data.auth.staff.find(s=>App.COMMITTEE_ROLES.includes(s.role));
    if(sec&&sec.phone){ U.sendWhatsApp(sec.phone, msg); }
    else U.toast("ജനറൽ സെക്രട്ടറിയുടെ നമ്പർ ലഭ്യമല്ല");
  },

  sendToManager(msg){
    const mgr = DB.data.auth.staff.find(s=>s.role==='manager');
    if(mgr&&mgr.phone){ U.sendWhatsApp(mgr.phone, msg); }
    else U.toast("മാനേജരുടെ നമ്പർ ലഭ്യമല്ല");
  }
};

document.addEventListener("DOMContentLoaded", () => App.init());

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// ===========================================================
// AttendanceShared — common attendance UI for Teacher (own
// classes) and Sadhar (any class, fill-in for absent teachers)
// ===========================================================
const AttendanceShared = {
  _state: {}, // namespace -> {selClass, selDate}

  render(allowedClasses, forSadhar, namespace){
    if(!this._state[namespace]) this._state[namespace] = {};
    const state = this._state[namespace];
    let selClass = (state.selClass && allowedClasses.includes(state.selClass)) ? state.selClass : allowedClasses[0];
    state.selClass = selClass;
    const todayStr = U.todayStr();
    let selDate = state.selDate || todayStr;
    state.selDate = selDate;

    let html = `<div class="form-group">
      <label>ക്ലാസ്സ് തിരഞ്ഞെടുക്കുക</label>
      <select id="att-class-${namespace}" onchange="AttendanceShared.onChange('${namespace}', ${forSadhar})">
        ${allowedClasses.map(c=>{
          const shiftLabel = forSadhar ? ` — ഷിഫ്റ്റ് ${U.classShift(c)||'-'}` : '';
          return `<option value="${c}" ${selClass===c?'selected':''}>${CLASS_LABELS[c]}${shiftLabel}</option>`;
        }).join("")}
      </select>
    </div>`;

    html += `<div class="form-group">
      <label>തീയതി (ഹാജർ എടുക്കാൻ / കാണാൻ)</label>
      <input type="date" id="att-date-${namespace}" min="${ATTENDANCE_MIN_DATE}" max="${todayStr}" value="${selDate}" onchange="AttendanceShared.onChange('${namespace}', ${forSadhar})">
    </div>`;

    html += `<div id="att-body-${namespace}">${this.bodyHtml(selClass, selDate, forSadhar, namespace)}</div>`;
    return html;
  },

  onChange(namespace, forSadhar){
    const classSel = document.getElementById(`att-class-${namespace}`);
    const dateSel = document.getElementById(`att-date-${namespace}`);
    const state = this._state[namespace];
    state.selClass = classSel.value;
    state.selDate = dateSel.value;
    const body = document.getElementById(`att-body-${namespace}`);
    body.innerHTML = this.bodyHtml(state.selClass, state.selDate, forSadhar, namespace);
    U.fixAccordionHeight(body);
  },

  bodyHtml(cls, dateStr, forSadhar, namespace){
    const todayStr = U.todayStr();
    const shiftKey = U.classShift(cls);
    const holiday = (dateStr === todayStr) ? U.shiftHoliday(shiftKey) : null;

    let html = "";
    if(forSadhar){
      html += this.teacherRowHtml(cls, dateStr);
    }
    if(holiday){
      html += `<div class="blur-box">
        <div class="blurred">${this.attendanceListHtml(cls, dateStr, true, forSadhar, namespace)}</div>
        <div class="blur-overlay">
          <div>
            <div style="font-size:18px; font-weight:800; color:var(--rose); margin-bottom:6px;">ഇന്ന് അവധിയാണ്!</div>
            <div style="font-size:13px; color:#7a3d35;">കാരണം: ${U.esc(holiday.reason)}</div>
          </div>
        </div>
      </div>`;
    } else {
      html += this.attendanceListHtml(cls, dateStr, false, forSadhar, namespace);
    }
    return html;
  },

  // For Sadhar mode: show the class's assigned teacher(s) with their own present/absent toggle,
  // so taking children's attendance doesn't wrongly mark an absent teacher as present.
  teacherRowHtml(cls, dateStr){
    const staff = DB.data.auth.staff;
    if(!staff || !Array.isArray(staff)) return `<div class="card" style="background:#fff7e6;"><p class="muted">ജീവനക്കാരുടെ data ലോഡ് ആകുന്നു...</p></div>`;
    const teachers = staff.filter(t=>t.role==='teacher' && (t.classes||[]).includes(cls));
    if(!teachers.length){
      return `<div class="card" style="background:#fff7e6;"><p class="muted">ഈ ക്ലാസ്സിന് നിയോഗിക്കപ്പെട്ട അധ്യാപകൻ ഇല്ല.</p></div>`;
    }
    const att = DB.data.attendance[dateStr] || {};
    let html = `<div class="card" style="background:#fff7e6;">
      <div class="card-title" style="font-size:14px;">👨‍🏫 ക്ലാസ്സ് അധ്യാപകന്റെ ഹാജർ</div>`;
    teachers.forEach(t=>{
      const status = att[t.id];
      html += `<div class="row" style="padding:6px 0;">
        <div style="display:flex; align-items:center; gap:8px; flex:1;">
          ${U.photoOrInitial(t.photo, t.name)}
          <span style="font-size:13.5px;">${U.esc(t.name)}</span>
        </div>
        <div style="display:flex; gap:6px;">
          <button class="btn-small" id="btn-tpresent-${t.id}" style="${status==='present'?'background:var(--moss);color:#fff;border-color:var(--moss);':''}" onclick="AttendanceShared.markTeacher('${t.id}','present','${dateStr}')">Present</button>
          <button class="btn-small" id="btn-tabsent-${t.id}" style="${status==='absent'?'background:var(--rose);color:#fff;border-color:var(--rose);':''}" onclick="AttendanceShared.markTeacher('${t.id}','absent','${dateStr}')">Absent</button>
        </div>
      </div>`;
    });
    html += `</div>`;
    return html;
  },

  markTeacher(teacherId, status, dateStr){
    if(!DB.data.attendance[dateStr]) DB.data.attendance[dateStr] = {};
    DB.data.attendance[dateStr][teacherId] = status;
    DB.save();
    const pBtn = document.getElementById(`btn-tpresent-${teacherId}`);
    const aBtn = document.getElementById(`btn-tabsent-${teacherId}`);
    if(pBtn && aBtn){
      if(status==='present'){
        pBtn.style.background="var(--moss)"; pBtn.style.color="#fff"; pBtn.style.borderColor="var(--moss)";
        aBtn.style.background=""; aBtn.style.color=""; aBtn.style.borderColor="";
      } else {
        aBtn.style.background="var(--rose)"; aBtn.style.color="#fff"; aBtn.style.borderColor="var(--rose)";
        pBtn.style.background=""; pBtn.style.color=""; pBtn.style.borderColor="";
      }
    }
    U.toast("അധ്യാപകന്റെ ഹാജർ രേഖപ്പെടുത്തി");
  },

  attendanceListHtml(cls, dateStr, disabled, forSadhar, namespace){
    const students = U.studentsByClass(cls);
    const att = DB.data.attendance[dateStr] || {};
    const isToday = (dateStr === U.todayStr());
    const displayDate = U.displayDateFromStr(dateStr);

    let html = `<div class="card">
      <div class="card-title">${CLASS_LABELS[cls]} — ${displayDate}</div>`;

    students.forEach(s=>{
      const status = att[s.id];
      html += `<div class="row" style="padding:6px 0;">
        <div style="display:flex; align-items:center; gap:8px; flex:1;">
          ${U.photoOrInitial(s.photo, s.name)}
          <span style="font-size:13.5px;">${U.esc(s.name)} <span class="muted" style="font-size:11.5px;">(Reg No: ${U.esc(s.reg)})</span></span>
        </div>
        <div style="display:flex; gap:6px;">
          <button class="btn-small" id="btn-present-${s.id}" style="${status==='present'?'background:var(--moss);color:#fff;border-color:var(--moss);':''}" ${disabled?'disabled':''} onclick="AttendanceShared.markAttendance('${s.id}','present','${cls}','${dateStr}',${forSadhar},'${namespace}')">Present</button>
          <button class="btn-small" id="btn-absent-${s.id}" style="${status==='absent'?'background:var(--rose);color:#fff;border-color:var(--rose);':''}" ${disabled?'disabled':''} onclick="AttendanceShared.markAttendance('${s.id}','absent','${cls}','${dateStr}',${forSadhar},'${namespace}')">Absent</button>
        </div>
      </div>
      <div id="wa-absent-${s.id}"></div>`;
    });
    if(students.length===0) html += `<p class="muted">ഈ ക്ലാസ്സിൽ കുട്ടികൾ ഇല്ല</p>`;
    if(!isToday) html += `<p class="muted" style="margin-top:8px;">⚠️ പഴയ തീയതിയിലെ ഹാജർ തിരുത്തുകയോ ചേർക്കുകയോ ചെയ്യുന്നു.</p>`;
    if(forSadhar) html += `<p class="muted" style="margin-top:8px;">ℹ️ സദർ നേരിട്ട് ഹാജർ നൽകുന്നു — ഇത് ക്ലാസ്സ് അധ്യാപകന്റെ ഹാജറിൽ മാറ്റം വരുത്തില്ല.</p>`;
    html += `</div>`;
    return html;
  },

  markAttendance(studentId, status, cls, dateStr, forSadhar, namespace){
    if(!DB.data.attendance[dateStr]) DB.data.attendance[dateStr] = {};
    DB.data.attendance[dateStr][studentId] = status;

    // Auto-mark teacher present for this shift (only for today's date, and only when a teacher takes their own attendance)
    if(!forSadhar && dateStr === U.todayStr()){
      const teacher = App.user;
      if(teacher.id){
        DB.data.attendance[dateStr][teacher.id] = "present";
      }
    }
    DB.save();

    if(status === 'absent'){
      const s = U.studentById(studentId);
      const senderName = (App.user && App.user.name) ? App.user.name : "ക്ലാസ്സ് അധ്യാപകൻ";
      const dateDisplay = U.displayDateFromStr(dateStr);
      const msg = `ബഹുമാനപ്പെട്ട രക്ഷിതാവേ, താങ്കളുടെ ${U.childWord(s)} ${s.name} (Reg No: ${s.reg}, ${CLASS_LABELS[s.cls]}) ${dateDisplay}-ന് മദ്റസയിൽ ഹാജരായിട്ടില്ല. വിവരം അറിയിക്കുന്നു. - ${senderName}, മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്.`;
      document.getElementById("wa-absent-"+studentId).innerHTML =
        `<div style="margin:4px 0 8px;"><button class="btn-wa" onclick='U.sendWhatsApp("${s.phone}", ${JSON.stringify(msg)})'>📩 രക്ഷിതാവിന് WhatsApp അയക്കുക</button></div>`;
    } else {
      const waBox = document.getElementById("wa-absent-"+studentId);
      if(waBox) waBox.innerHTML = "";
    }

    const presentBtn = document.getElementById("btn-present-"+studentId);
    const absentBtn = document.getElementById("btn-absent-"+studentId);
    if(presentBtn && absentBtn){
      if(status === 'present'){
        presentBtn.style.background = "var(--moss)"; presentBtn.style.color = "#fff"; presentBtn.style.borderColor = "var(--moss)";
        absentBtn.style.background = ""; absentBtn.style.color = ""; absentBtn.style.borderColor = "";
      } else {
        absentBtn.style.background = "var(--rose)"; absentBtn.style.color = "#fff"; absentBtn.style.borderColor = "var(--rose)";
        presentBtn.style.background = ""; presentBtn.style.color = ""; presentBtn.style.borderColor = "";
      }
    }

    if(forSadhar){
      const body = document.getElementById(`att-body-${namespace}`);
      if(body) U.fixAccordionHeight(body);
    }
  }
};

</script>
