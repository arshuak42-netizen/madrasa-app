// ===========================================================
// app.js — Core application logic
// ===========================================================

const App = {
  user: null, // {type:'sadhar'|'teacher'|'president'|'gs'|'joint-secretary'|'manager'|'committee'|'parent', ...}
  currentTab: null,

  COMMITTEE_ROLES: ["president","gs","joint-secretary","manager","committee"],
  ROLE_LABELS: {
    teacher: "അധ്യാപകൻ (Teacher)",
    president: "പ്രസിഡണ്ട് (President)",
    gs: "ജനറൽ സെക്രട്ടറി (General Secretary)",
    "joint-secretary": "ജോയിന്റ് സെക്രട്ടറി (Joint Secretary)",
    manager: "മാനേജർ (Manager)",
    committee: "കമ്മിറ്റി അംഗം (Committee Member)"
  },

  isCommittee(type){
    return this.COMMITTEE_ROLES.includes(type);
  },

  init(){
    DB.load();
    const session = sessionStorage.getItem("madrasa_session");
    if(session){
      try{
        this.user = JSON.parse(session);
        this.showApp();
      }catch(e){
        this.showLogin();
      }
    } else {
      this.showLogin();
    }
  },

  showLogin(){
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("main-app").style.display = "none";
  },

  showApp(){
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-app").style.display = "block";
    this.renderNav();
    this.goTo(this.defaultTab());
    this.setTopbarRole();
  },

  setTopbarRole(){
    const u = this.user;
    let label = "";
    if(u.type === "sadhar") label = "സദർ പാനൽ";
    else if(u.type === "teacher") label = (u.name || "അധ്യാപകൻ") + " — ടീച്ചർ പാനൽ";
    else if(this.isCommittee(u.type)) label = (u.name || "കമ്മിറ്റി") + " — " + (this.ROLE_LABELS[u.type] || "മാനേജ്മെന്റ്");
    else if(u.type === "parent") label = (u.studentName || "") + " — രക്ഷിതാവ്";
    document.getElementById("topbar-role").textContent = label;
  },

  login(){
    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;
    const errBox = document.getElementById("login-error");
    errBox.textContent = "";

    if(!username || !password){
      errBox.textContent = "യൂസർനെയിമും പാസ്‌വേർഡും നൽകുക.";
      return;
    }

    const data = DB.data;

    // 1. Sadhar
    if(username === data.auth.sadhar.username && password === data.auth.sadhar.password){
      this.user = { type: "sadhar" };
      sessionStorage.setItem("madrasa_session", JSON.stringify(this.user));
      this.showApp();
      return;
    }

    // 2. Staff (teacher/committee)
    const staff = data.auth.staff.find(s => s.username === username && s.password === password);
    if(staff){
      this.user = { type: staff.role, id: staff.id, name: staff.name, classes: staff.classes || [] };
      sessionStorage.setItem("madrasa_session", JSON.stringify(this.user));
      this.showApp();
      return;
    }

    // 3. Parent (username = student reg no)
    const student = data.students.find(s => s.reg === username);
    if(student && student.parentPassword && student.parentPassword === password){
      this.user = { type: "parent", studentId: student.id, studentReg: student.reg, studentName: student.name };
      sessionStorage.setItem("madrasa_session", JSON.stringify(this.user));
      this.showApp();
      return;
    }
    // Allow default parent password = reg no itself if not yet set
    if(student && !student.parentPassword && password === student.reg){
      this.user = { type: "parent", studentId: student.id, studentReg: student.reg, studentName: student.name };
      sessionStorage.setItem("madrasa_session", JSON.stringify(this.user));
      this.showApp();
      return;
    }

    errBox.textContent = "യൂസർനെയിമോ പാസ്‌വേർഡോ തെറ്റാണ്. വീണ്ടും ശ്രമിക്കുക.";
  },

  logout(){
    sessionStorage.removeItem("madrasa_session");
    this.user = null;
    document.getElementById("login-username").value = "";
    document.getElementById("login-password").value = "";
    document.getElementById("login-error").textContent = "";
    this.showLogin();
  },

  showPublicResults(){
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("public-screen").style.display = "block";
    document.getElementById("public-container").innerHTML = Public.render();
  },

  hidePublicResults(){
    document.getElementById("public-screen").style.display = "none";
    document.getElementById("login-screen").style.display = "flex";
  },

  defaultTab(){
    if(this.user.type === "sadhar") return "sadhar-home";
    if(this.user.type === "teacher") return "teacher-attendance";
    if(this.isCommittee(this.user.type)) return "committee-dashboard";
    if(this.user.type === "parent") return "parent-home";
    return "sadhar-home";
  },

  // ---------- Navigation ----------
  navConfig(){
    if(this.user.type === "sadhar"){
      return [
        {id:"sadhar-home", icon:"🏛️", label:"പാനൽ"},
        {id:"sadhar-students", icon:"🧒", label:"കുട്ടികൾ"},
        {id:"sadhar-staff", icon:"👥", label:"ജീവനക്കാർ"},
        {id:"sadhar-announce", icon:"📢", label:"അറിയിപ്പ്"},
        {id:"sadhar-complaints", icon:"💬", label:"പരാതികൾ"}
      ];
    }
    if(this.user.type === "teacher"){
      return [
        {id:"teacher-attendance", icon:"✅", label:"ഹാജർ"},
        {id:"teacher-fees", icon:"💰", label:"ഫീസ്"},
        {id:"teacher-review", icon:"📝", label:"റിവ്യൂ"},
        {id:"teacher-suggestions", icon:"💬", label:"നിർദ്ദേശം"},
        {id:"teacher-more", icon:"☰", label:"കൂടുതൽ"}
      ];
    }
    if(this.isCommittee(this.user.type)){
      return [
        {id:"committee-dashboard", icon:"📊", label:"ഡാഷ്ബോർഡ്"},
        {id:"committee-fees", icon:"💰", label:"ഫീസ്"},
        {id:"committee-staff", icon:"👥", label:"ജീവനക്കാർ"}
      ];
    }
    if(this.user.type === "parent"){
      return [
        {id:"parent-home", icon:"🏠", label:"ഹോം"},
        {id:"parent-fees", icon:"💰", label:"ഫീസ്"},
        {id:"parent-results", icon:"📋", label:"റിസൾട്ട്"},
          {id:"parent-staff", icon:"👨‍🏫", label:"സ്റ്റാഫ്"},
          {id:"parent-profile", icon:"⚙️", label:"പ്രൊഫൈൽ"}
        ];
    }
    return [];
  },

  renderNav(){
    const nav = document.getElementById("bottom-nav");
    nav.innerHTML = "";
    this.navConfig().forEach(item => {
      const btn = document.createElement("button");
      btn.className = "nav-btn";
      btn.id = "navbtn-" + item.id;
      btn.innerHTML = `<span class="nav-icon">${item.icon}</span><span>${item.label}</span>`;
      btn.onclick = () => this.goTo(item.id);
      nav.appendChild(btn);
    });
  },

  goTo(tabId){
    this.currentTab = tabId;
    // update nav active state
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    const navBtn = document.getElementById("navbtn-" + tabId);
    if(navBtn) navBtn.classList.add("active");

    const container = document.getElementById("app-container");
    container.innerHTML = Renderers.render(tabId);
    window.scrollTo(0,0);
  },

  refresh(){
    this.goTo(this.currentTab);
  }
};

// ===========================================================
// Helper utilities
// ===========================================================
const U = {
  toast(msg, ms=2200){
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(()=> el.classList.remove("show"), ms);
  },

  uid(prefix="ID"){
    return prefix + Date.now().toString(36) + Math.floor(Math.random()*1000);
  },

  todayStr(){
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0') + "-" + String(d.getDate()).padStart(2,'0');
  },

  todayDisplay(){
    const d = new Date();
    return String(d.getDate()).padStart(2,'0') + "/" + String(d.getMonth()+1).padStart(2,'0') + "/" + d.getFullYear();
  },

  // Convert "YYYY-MM-DD" to "DD/MM/YYYY"
  displayDateFromStr(dateStr){
    const parts = dateStr.split("-");
    if(parts.length !== 3) return dateStr;
    return `${parts[2]}/${parts[1]}/${parts[0]}`;
  },

  // After dynamically changing content inside an open accordion, recalc its max-height
  // so the new (taller) content isn't clipped.
  fixAccordionHeight(el){
    let node = el;
    while(node && node !== document.body){
      if(node.classList && node.classList.contains('accordion-item') && node.classList.contains('open')){
        const body = node.querySelector('.accordion-body');
        if(body) body.style.maxHeight = body.scrollHeight + 'px';
        return;
      }
      node = node.parentElement;
    }
  },

  // Return all date strings ("YYYY-MM-DD") for a given month ("YYYY-MM"),
  // clamped to academic year start (2026-06-01) and today.
  datesInMonth(monthKey){
    const [y, m] = monthKey.split("-").map(Number);
    const daysInMonth = new Date(y, m, 0).getDate();
    const start = new Date("2026-06-01T00:00:00");
    const today = new Date();
    today.setHours(0,0,0,0);
    const dates = [];
    for(let d=1; d<=daysInMonth; d++){
      const dt = new Date(y, m-1, d);
      if(dt < start) continue;
      if(dt > today) continue;
      const ds = dt.getFullYear() + "-" + String(dt.getMonth()+1).padStart(2,'0') + "-" + String(dt.getDate()).padStart(2,'0');
      dates.push(ds);
    }
    return dates;
  },

  // "മകൻ" / "മകൾ" based on gender field, fallback to "മകൻ/മകൾ"
  childWord(student){
    if(student.gender === 'm') return "മകൻ";
    if(student.gender === 'f') return "മകൾ";
    return "മകൻ/മകൾ";
  },

  esc(str){
    if(str === undefined || str === null) return "";
    return String(str).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  },

  studentById(id){
    return DB.data.students.find(s => s.id === id);
  },
  studentByReg(reg){
    return DB.data.students.find(s => s.reg === reg);
  },
  studentsByClass(cls){
    return DB.data.students.filter(s => s.cls === cls);
  },

  classShift(cls){
    for(const sk of [1,2,3]){
      if(DB.data.shifts[sk].classes.includes(cls)) return sk;
    }
    return null;
  },

  // Check holidayLog for whether a given class's shift was on holiday on dateStr
  isHolidayForClass(dateStr, cls){
    const shift = this.classShift(cls);
    return (DB.data.holidayLog || []).some(h => h.date === dateStr && (h.target === "all" || parseInt(h.target) === shift));
  },


  shiftHoliday(shiftKey){
    const h = DB.data.holidays;
    if(h["all"] && h["all"].active) return h["all"];
    if(h[String(shiftKey)] && h[String(shiftKey)].active) return h[String(shiftKey)];
    return null;
  },

  initials(name){
    if(!name) return "?";
    return name.trim().charAt(0);
  },

  photoOrInitial(photo, name, cls="photo-circle"){
    if(photo){
      return `<img src="${photo}" class="${cls}" alt="">`;
    }
    return `<div class="${cls}">${U.esc(U.initials(name))}</div>`;
  },

  // WhatsApp link opener
  sendWhatsApp(phone, message){
    let p = (phone || "").replace(/\D/g,"");
    if(p.length === 10) p = "91" + p;
    const url = `https://wa.me/${p}?text=${encodeURIComponent(message)}`;
    window.open(url, "_blank");
  },

  readImageFile(file, callback){
    const reader = new FileReader();
    reader.onload = (e) => callback(e.target.result);
    reader.readAsDataURL(file);
  },

  // Generate fee receipt message. recipientType: 'parent' | 'gs' | 'manager'
  feeMessage(student, paidNow, dateStr, months, recipientType){
    const totalPaid = student.paidTotal;
    const annual = DB.data.fees.annual;
    const balance = Math.max(annual - totalPaid, 0);
    const collectorName = (App.user && App.user.name) ? App.user.name : "സ്റ്റാഫ്";
    const collectorRole = (App.user && App.user.type === 'sadhar') ? "സദർ" : "ക്ലാസ്സ് അധ്യാപകൻ";
    const monthsText = (months && months.length) ? ` (${months.map(mk=>MONTH_LABELS[mk]||mk).join(", ")} മാസത്തെ ഫീസ്)` : "";

    let greeting;
    if(recipientType === 'gs') greeting = "അസ്സലാമു അലൈക്കും, പ്രിയപ്പെട്ട ജനറൽ സെക്രട്ടറി,";
    else if(recipientType === 'manager') greeting = "അസ്സലാമു അലൈക്കും, പ്രിയപ്പെട്ട മാനേജർ,";
    else greeting = "അസ്സലാമു അലൈക്കും, പ്രിയപ്പെട്ട രക്ഷിതാവേ,";

    let body;
    if(recipientType === 'parent'){
      body = `നിങ്ങളുടെ ${U.childWord(student)} ${student.name} (${CLASS_LABELS[student.cls] || student.cls}, Reg No: ${student.reg}) ${dateStr} തീയതിയിൽ മദ്റസയിൽ ₹${paidNow} ഫീസ്${monthsText} അടച്ചിട്ടുണ്ട്. ഇത് ${collectorName} (${collectorRole}) കൈപ്പറ്റിയിരിക്കുന്നു. ആകെ അടച്ച തുക: ₹${totalPaid}, ഇനി അടക്കാനുള്ള ബാക്കി കുടിശ്ശിക തുക: ₹${balance}.`;
    } else {
      body = `${CLASS_LABELS[student.cls] || student.cls} ക്ലാസ്സിൽ പഠിക്കുന്ന ${student.name} (Reg No: ${student.reg}) ${dateStr} തീയതിയിൽ മദ്റസയിൽ ₹${paidNow} ഫീസ്${monthsText} അടച്ചിട്ടുണ്ട്. ഇത് ${collectorName} (${collectorRole}) കൈപ്പറ്റിയിരിക്കുന്നു. ആകെ അടച്ച തുക: ₹${totalPaid}, ഇനി അടക്കാനുള്ള ബാക്കി കുടിശ്ശിക തുക: ₹${balance}.`;
    }

    return `${greeting}\n\n${body}\n\nനന്ദി. - മമ്പഉൽ ഉലൂം മദ്റസ കൊറക്കോട്.`;
  },

  // Returns a Set of month-keys already covered by any payment for this student.
  // If excludePaymentIndex is given, that payment's own months are not counted (so they remain selectable while editing it).
  paidMonthsSet(student, excludePaymentIndex){
    const set = new Set();
    (student.payments||[]).forEach((p,i)=>{
      if(i === excludePaymentIndex) return;
      (p.months||[]).forEach(m=>set.add(m));
    });
    return set;
  },

  // accordion toggle
  toggleAccordion(id){
    const el = document.getElementById(id);
    if(!el) return;
    const wasOpen = el.classList.contains("open");
    el.classList.toggle("open");
    const body = el.querySelector(".accordion-body");
    if(!wasOpen){
      body.style.maxHeight = body.scrollHeight + "px";
    } else {
      body.style.maxHeight = "0px";
    }
  }
};

// ===========================================================
// FeeShared — common fee-collection UI for Sadhar (all classes)
// and Teacher (restricted to own classes)
// ===========================================================
const FeeShared = {
  allowedClasses: null, // null = no restriction (Sadhar); array of class keys = restricted (Teacher)

  render(allowedClasses){
    this.allowedClasses = allowedClasses;
    let html = `<div class="card">
      <div class="form-group">
        <label>കുട്ടിയുടെ രജിസ്റ്റർ നമ്പർ</label>
        <input type="text" id="fee-reg" inputmode="numeric" oninput="FeeShared.lookupStudent()" placeholder="ഉദാ: 691">
      </div>
      <div id="fee-student-info"></div>
    </div>`;
    return html;
  },

  lookupStudent(){
    const reg = (document.getElementById("fee-reg")||{}).value||"";
    const infoBox = document.getElementById("fee-student-info");
    if(!infoBox) return;
    if(!reg.trim()){ infoBox.innerHTML=""; return; }
    const s = U.studentByReg(reg.trim());
    if(!s){
      infoBox.innerHTML = `<p class="muted" style="margin-top:8px;">കുട്ടിയെ കണ്ടെത്താനായില്ല</p>`;
      return;
    }
    if(this.allowedClasses && !this.allowedClasses.includes(s.cls)){
      infoBox.innerHTML = `<p style="margin-top:8px; color:var(--rose); font-weight:600;">⚠️ ${CLASS_LABELS[s.cls]||s.cls} ക്ലാസ്സിലെ കുട്ടികളുടെ ഫീസ് നിങ്ങൾക്ക് കൈകാര്യം ചെയ്യാൻ അനുവാദമില്ല. നിങ്ങളുടെ ക്ലാസ്സിലെ കുട്ടിയുടെ Reg No നൽകുക.</p>`;
      return;
    }
    infoBox.innerHTML = this.studentHtml(s);
    U.fixAccordionHeight(infoBox);
  },

  studentHtml(s){
    const balance = Math.max(DB.data.fees.annual - s.paidTotal, 0);
    const payHist = (s.payments||[]).slice().reverse();
    const paidMonths = U.paidMonthsSet(s);

    let histHtml = "";
    if(payHist.length){
      histHtml = `<div class="divider"></div>
        <div class="card-title" style="font-size:14px; margin-bottom:8px;">📋 ഫീസ് ഹിസ്റ്ററി (Payment History)</div>`;
      payHist.forEach((p,revIdx)=>{
        const idx = (s.payments.length - 1) - revIdx;
        const monthsText = (p.months&&p.months.length) ? p.months.map(mk=>MONTH_LABELS[mk]||mk).join(", ") : "—";
        const msgParent = U.feeMessage(s, p.amount, p.date, p.months||[], 'parent');
        const msgGs = U.feeMessage(s, p.amount, p.date, p.months||[], 'gs');
        const msgMgr = U.feeMessage(s, p.amount, p.date, p.months||[], 'manager');
        histHtml += `<div class="card" style="margin-bottom:8px; background:#f8f5ef;">
          <div class="row" style="margin-bottom:4px;">
            <span style="font-weight:700;">₹${p.amount}</span>
            <span class="muted" style="font-size:12px;">${p.date}</span>
          </div>
          <div class="muted" style="font-size:12px; margin-bottom:8px;">മാസം: ${monthsText}</div>
          <div class="btn-grid">
            <button class="btn-wa" onclick='U.sendWhatsApp("${s.phone}", ${JSON.stringify(msgParent)})'>📩 രക്ഷിതാവിന്</button>
            <button class="btn-wa" onclick='FeeShared.sendToSecretary(${JSON.stringify(msgGs)})'>📩 സെക്രട്ടറിക്ക്</button>
            <button class="btn-wa" onclick='FeeShared.sendToManager(${JSON.stringify(msgMgr)})'>📩 മാനേജർക്ക്</button>
            <button class="btn-small" onclick="FeeShared.startEditPayment('${s.id}',${idx})">✏️ തിരുത്ത്</button>
          </div>
          <div id="fee-edit-area-${s.id}-${idx}"></div>
        </div>`;
      });
    }

    const availableMonths = ACADEMIC_MONTHS.filter(m=>!paidMonths.has(m.key));
    const monthCheckboxHtml = availableMonths.length
      ? `<div class="month-grid">
          ${availableMonths.map(m=>`
            <label class="month-chip">
              <input type="checkbox" value="${m.key}" class="fee-month-cb">
              <span>${m.label}</span>
            </label>
          `).join("")}
        </div>`
      : `<p class="muted">✅ ഇതുവരെ ലഭ്യമായ എല്ലാ മാസത്തെയും ഫീസ് അടച്ചു കഴിഞ്ഞു.</p>`;

    return `
      <div class="divider"></div>
      <div class="row">
        ${U.photoOrInitial(s.photo, s.name)}
        <div style="flex:1; margin-left:10px;">
          <div class="card-title" style="margin-bottom:2px;">${U.esc(s.name)}</div>
          <div class="muted">${CLASS_LABELS[s.cls]} • Reg No: ${s.reg}</div>
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <span class="muted">ആകെ അടച്ച തുക</span><strong>₹${s.paidTotal}</strong>
      </div>
      <div class="row">
        <span class="muted">ബാക്കി കുടിശ്ശിക</span><strong style="color:var(--rose);">₹${balance}</strong>
      </div>
      <div class="divider"></div>
      <div class="card-title" style="font-size:14px; margin-bottom:8px;">➕ പുതിയ ഫീസ് ചേർക്കുക</div>
      <div class="form-group">
        <label>ഏത് മാസത്തെ ഫീസ്? (ഒന്നോ അധികമോ)</label>
        ${monthCheckboxHtml}
      </div>
      <div class="form-group">
        <label>ഇപ്പോൾ അടക്കുന്ന തുക (₹)</label>
        <input type="number" id="fee-amount" placeholder="0">
      </div>
      <button class="primary-btn btn-block" onclick="FeeShared.collectFee('${s.id}')">ഫീസ് സ്വീകരിക്കുക</button>
      ${histHtml}
    `;
  },

  startEditPayment(studentId, paymentIndex){
    const s = U.studentById(studentId);
    const p = s.payments[paymentIndex];
    const areaId = `fee-edit-area-${studentId}-${paymentIndex}`;
    const area = document.getElementById(areaId);
    if(!area) return;
    const paidMonths = U.paidMonthsSet(s, paymentIndex); // exclude this payment's own months
    area.innerHTML = `
      <div class="divider"></div>
      <div style="font-weight:700; margin-bottom:8px;">✏️ പേയ്മെന്റ് തിരുത്തുക</div>
      <div class="form-group">
        <label>തുക (₹)</label>
        <input type="number" id="edit-fee-amount-${studentId}-${paymentIndex}" value="${p.amount}">
      </div>
      <div class="form-group">
        <label>മാസങ്ങൾ</label>
        <div class="month-grid">
          ${ACADEMIC_MONTHS.map(m=>{
            const alreadyPaidElsewhere = paidMonths.has(m.key);
            const checked = (p.months||[]).includes(m.key);
            if(alreadyPaidElsewhere && !checked) return ""; // hide months paid by other entries
            return `<label class="month-chip">
              <input type="checkbox" value="${m.key}" class="edit-month-${studentId}-${paymentIndex}" ${checked?'checked':''}>
              <span>${m.label}</span>
            </label>`;
          }).join("")}
        </div>
      </div>
      <div class="btn-grid">
        <button class="primary-btn" onclick="FeeShared.savePaymentEdit('${studentId}',${paymentIndex})">✅ സേവ്</button>
        <button class="btn-danger" onclick="FeeShared.deletePayment('${studentId}',${paymentIndex})">🗑️ ഡിലീറ്റ്</button>
      </div>
    `;
  },

  savePaymentEdit(studentId, paymentIndex){
    const s = U.studentById(studentId);
    const newAmount = parseFloat((document.getElementById(`edit-fee-amount-${studentId}-${paymentIndex}`)||{}).value||"0");
    if(!newAmount||newAmount<=0){ U.toast("ശരിയായ തുക നൽകുക"); return; }
    const months = Array.from(document.querySelectorAll(`.edit-month-${studentId}-${paymentIndex}`))
      .filter(cb=>cb.checked).map(cb=>cb.value);
    const oldAmount = s.payments[paymentIndex].amount;
    s.paidTotal = s.paidTotal - oldAmount + newAmount;
    s.payments[paymentIndex].amount = newAmount;
    s.payments[paymentIndex].months = months;
    DB.save();
    U.toast("പേയ്മെന്റ് തിരുത്തി");
    (()=>{ const box=document.getElementById("fee-student-info"); box.innerHTML = FeeShared.studentHtml(s); U.fixAccordionHeight(box); })();
  },

  deletePayment(studentId, paymentIndex){
    const s = U.studentById(studentId);
    const removed = s.payments.splice(paymentIndex,1)[0];
    s.paidTotal = Math.max(0, s.paidTotal - removed.amount);
    DB.save();
    U.toast("പേയ്മെന്റ് നീക്കം ചെയ്തു");
    (()=>{ const box=document.getElementById("fee-student-info"); box.innerHTML = FeeShared.studentHtml(s); U.fixAccordionHeight(box); })();
  },

  collectFee(studentId){
    const amount = parseFloat((document.getElementById("fee-amount")||{}).value||"0");
    if(!amount||amount<=0){ U.toast("തുക നൽകുക"); return; }
    const months = Array.from(document.querySelectorAll('.fee-month-cb'))
      .filter(cb=>cb.checked).map(cb=>cb.value);
    const s = U.studentById(studentId);
    s.paidTotal += amount;
    const date = U.todayDisplay();
    s.payments.push({ amount, date, months });
    DB.save();
    U.toast(`₹${amount} ഫീസ് രേഖപ്പെടുത്തി ✅`);
    (()=>{ const box=document.getElementById("fee-student-info"); box.innerHTML = FeeShared.studentHtml(s); U.fixAccordionHeight(box); })();
  },

  sendToSecretary(msg){
    let sec = DB.data.auth.staff.find(s=>s.role==='gs');
    if(!sec) sec = DB.data.auth.staff.find(s=>App.COMMITTEE_ROLES.includes(s.role));
    if(sec&&sec.phone){ U.sendWhatsApp(sec.phone, msg); }
    else U.toast("ജനറൽ സെക്രട്ടറിയുടെ നമ്പർ ലഭ്യമല്ല");
  },

  sendToManager(msg){
    const mgr = DB.data.auth.staff.find(s=>s.role==='manager');
    if(mgr&&mgr.phone){ U.sendWhatsApp(mgr.phone, msg); }
    else U.toast("മാനേജരുടെ നമ്പർ ലഭ്യമല്ല");
  }
};

document.addEventListener("DOMContentLoaded", () => App.init());

</script>
